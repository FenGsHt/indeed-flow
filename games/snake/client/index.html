<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <script src="/auth-gate.js"></script>
  <title>SNAKE ARENA · INDEED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
  <style>
    :root {
      --green:   #39ff14;
      --green2:  #00c832;
      --amber:   #ffb800;
      --red:     #ff3131;
      --cyan:    #00e5ff;
      --bg:      #060806;
      --bg2:     #0d120d;
      --border:  #1e3020;
      --dim:     rgba(57,255,20,0.25);
      --font:    'Press Start 2P', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--green);
      font-family: var(--font);
      image-rendering: pixelated;
    }

    /* ── CRT body noise ──────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 999;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 2px,
        rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px
      );
    }

    /* ══════════════════════════════════════════════════════════════
       JOIN SCREEN
    ══════════════════════════════════════════════════════════════ */
    #join-screen {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      z-index: 100;
    }
    #join-screen.hidden { display: none; }

    .join-card {
      width: 360px;
      max-width: calc(100vw - 32px);
      padding: 36px 28px;
      background: var(--bg2);
      border: 2px solid var(--green2);
      box-shadow: 0 0 0 1px var(--bg), 0 0 24px rgba(57,255,20,0.15), inset 0 0 40px rgba(0,0,0,0.6);
      text-align: center;
    }

    .join-logo {
      font-size: 8px;
      letter-spacing: 4px;
      color: var(--dim);
      margin-bottom: 24px;
    }

    .join-ascii {
      font-size: 9px;
      line-height: 1.6;
      color: var(--green);
      margin-bottom: 8px;
      text-shadow: 0 0 8px var(--green);
    }

    .join-subtitle {
      font-size: 7px;
      color: var(--dim);
      margin-bottom: 28px;
      line-height: 2;
    }

    .join-label {
      font-size: 7px;
      color: var(--green2);
      text-align: left;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .join-input {
      width: 100%;
      padding: 10px 12px;
      background: #000;
      border: 1px solid var(--green2);
      color: var(--green);
      font-family: var(--font);
      font-size: 10px;
      outline: none;
      margin-bottom: 6px;
      caret-color: var(--green);
      letter-spacing: 1px;
    }
    .join-input::placeholder { color: rgba(57,255,20,0.2); }
    .join-input:focus { border-color: var(--green); box-shadow: 0 0 8px rgba(57,255,20,0.3); }

    .join-conn-status {
      font-size: 7px;
      color: var(--dim);
      margin-bottom: 16px;
      min-height: 14px;
      letter-spacing: 1px;
    }
    .join-conn-status.connected { color: var(--green); }

    .join-btn {
      width: 100%;
      padding: 14px;
      background: #000;
      border: 2px solid var(--green);
      color: var(--green);
      font-family: var(--font);
      font-size: 10px;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: background 0.1s, color 0.1s, box-shadow 0.1s;
      margin-bottom: 20px;
    }
    .join-btn:hover:not(:disabled) {
      background: var(--green);
      color: #000;
      box-shadow: 0 0 20px rgba(57,255,20,0.5);
    }
    .join-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .join-back {
      font-size: 7px;
      color: var(--dim);
      text-decoration: none;
      letter-spacing: 1px;
    }
    .join-back:hover { color: var(--green); }

    /* ══════════════════════════════════════════════════════════════
       GAME SCREEN
    ══════════════════════════════════════════════════════════════ */
    #game-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      background: var(--bg);
    }
    #game-screen.hidden { display: none; }

    /* ── Topbar ─────────────────────────────────────────────────── */
    #topbar {
      height: 48px; min-height: 48px;
      display: flex; align-items: center;
      padding: 0 14px; gap: 10px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .topbar-back {
      font-size: 7px; color: var(--dim);
      text-decoration: none; white-space: nowrap;
      flex-shrink: 0; letter-spacing: 1px;
    }
    .topbar-back:hover { color: var(--green); }

    .topbar-sep {
      width: 1px; height: 18px;
      background: var(--border); flex-shrink: 0;
    }

    .topbar-title {
      font-size: 8px; color: var(--green);
      white-space: nowrap; flex-shrink: 0;
      letter-spacing: 2px;
      text-shadow: 0 0 10px var(--green);
    }

    .topbar-spacer { flex: 1; }

    .topbar-stat {
      display: flex; flex-direction: column;
      align-items: center; flex-shrink: 0; gap: 2px;
    }
    .topbar-stat-label {
      font-size: 6px; color: var(--dim); line-height: 1; letter-spacing: 1px;
    }
    .topbar-stat-value {
      font-size: 11px; line-height: 1;
    }
    .topbar-stat-value.score-val { color: var(--amber); text-shadow: 0 0 8px var(--amber); }
    .topbar-stat-value.kills-val { color: var(--red);   text-shadow: 0 0 8px var(--red); }
    .topbar-stat-value.online-val{ color: var(--cyan);  text-shadow: 0 0 8px var(--cyan); }

    .topbar-player {
      display: flex; align-items: center;
      gap: 6px; flex-shrink: 0; max-width: 110px;
    }
    .topbar-dot {
      width: 7px; height: 7px;
      flex-shrink: 0;
    }
    .topbar-name {
      font-size: 7px; color: var(--green);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      letter-spacing: 1px;
    }

    /* ── Main area ──────────────────────────────────────────────── */
    #main-area { flex: 1; display: flex; min-height: 0; }

    /* ── Canvas wrap ────────────────────────────────────────────── */
    #canvas-wrap {
      flex: 1; display: flex;
      align-items: center; justify-content: center;
      position: relative; min-width: 0; overflow: hidden;
      background: var(--bg);
    }

    /* CRT scanlines on canvas area */
    #canvas-wrap::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 3px,
        rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px
      );
      pointer-events: none; z-index: 1;
    }

    #game-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      position: relative; z-index: 0;
    }

    /* ── Death overlay ──────────────────────────────────────────── */
    #death-overlay {
      position: absolute; inset: 0; z-index: 2;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.75);
      pointer-events: none; opacity: 0; transition: opacity 0.2s;
    }
    #death-overlay.visible { opacity: 1; }

    .death-card {
      text-align: center;
      padding: 28px 36px;
      background: #000;
      border: 2px solid var(--red);
      box-shadow: 0 0 30px rgba(255,49,49,0.3), inset 0 0 20px rgba(255,49,49,0.05);
    }

    .death-title {
      font-size: 16px; color: var(--red);
      margin-bottom: 14px; letter-spacing: 2px;
      text-shadow: 0 0 12px var(--red);
      animation: blink 0.8s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .death-killer {
      font-size: 8px; color: rgba(255,255,255,0.5);
      margin-bottom: 20px; line-height: 2;
    }
    .death-killer strong { color: var(--amber); }

    .death-respawn-label {
      font-size: 7px; color: var(--dim); margin-bottom: 8px; letter-spacing: 1px;
    }
    .death-countdown {
      font-size: 36px; color: var(--green);
      text-shadow: 0 0 20px var(--green);
    }

    /* ── Sidebar ────────────────────────────────────────────────── */
    #sidebar {
      width: 220px; min-width: 220px;
      display: flex; flex-direction: column;
      background: var(--bg2);
      border-left: 1px solid var(--border);
      overflow: hidden;
    }

    .sidebar-header {
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border);
      font-size: 7px; color: var(--green);
      letter-spacing: 2px; flex-shrink: 0;
      text-shadow: 0 0 8px var(--green);
    }

    .sidebar-col-labels {
      display: flex; align-items: center;
      padding: 4px 10px 4px 10px; gap: 7px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .col-rank  { font-size: 6px; width: 18px; color: var(--dim); flex-shrink:0; text-align:center; }
    .col-dot   { width: 7px; flex-shrink:0; }
    .col-name  { flex:1; font-size: 6px; color: var(--dim); min-width:0; }
    .col-kills { font-size: 6px; color: var(--red);   flex-shrink:0; width:28px; text-align:right; letter-spacing:1px; }
    .col-score { font-size: 6px; color: var(--amber); flex-shrink:0; width:32px; text-align:right; letter-spacing:1px; }

    .lb-list {
      flex: 1; overflow-y: auto; padding: 4px 0;
    }
    .lb-list::-webkit-scrollbar { width: 3px; }
    .lb-list::-webkit-scrollbar-track { background: transparent; }
    .lb-list::-webkit-scrollbar-thumb { background: var(--border); }

    .lb-item {
      display: flex; align-items: center;
      padding: 6px 10px; gap: 7px;
    }
    .lb-item.mine {
      background: rgba(57,255,20,0.07);
      border-left: 2px solid var(--green);
    }
    .lb-item.dead { opacity: 0.35; }

    .lb-rank  { font-size: 8px; width: 18px; text-align:center; flex-shrink:0; color: var(--dim); }
    .lb-dot   { width: 7px; height: 7px; flex-shrink:0; }
    .lb-name  {
      flex:1; font-size: 7px; color: rgba(255,255,255,0.7);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0;
      letter-spacing: 0.5px;
    }
    .lb-kills { font-size: 9px; flex-shrink:0; color: var(--red);   width:28px; text-align:right; letter-spacing:1px; }
    .lb-score { font-size: 9px; flex-shrink:0; color: var(--amber); width:32px; text-align:right; letter-spacing:1px; }

    .sidebar-footer {
      padding: 8px 10px;
      border-top: 1px solid var(--border);
      font-size: 6px; color: var(--dim);
      text-align: center; letter-spacing: 1px;
      flex-shrink: 0;
    }

    /* ── Mobile leaderboard ─────────────────────────────────────── */
    #mobile-lb-toggle {
      display: none; align-items: center; justify-content: space-between;
      padding: 0 14px; height: 34px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      font-size: 7px; color: var(--dim);
      cursor: pointer; flex-shrink: 0;
      letter-spacing: 1px;
    }

    #mobile-lb-panel {
      display: none; flex-direction: column;
      background: #000;
      border-top: 1px solid var(--border);
      max-height: 200px; overflow-y: auto;
      flex-shrink: 0;
    }
    #mobile-lb-panel.open { display: flex; }

    /* ── Toast ──────────────────────────────────────────────────── */
    #toast-container {
      position: fixed; top: 56px; left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      display: flex; flex-direction: column;
      align-items: center; gap: 6px;
      pointer-events: none;
    }
    .toast {
      padding: 7px 14px;
      background: #000;
      border: 1px solid var(--green2);
      font-size: 7px; color: var(--green);
      letter-spacing: 1px;
      white-space: nowrap;
      animation: toastIn 0.15s ease, toastOut 0.3s ease 2.4s forwards;
      box-shadow: 0 0 12px rgba(57,255,20,0.2);
    }
    .toast.kill-toast { border-color: var(--red); color: var(--red); box-shadow: 0 0 12px rgba(255,49,49,0.2); }
    @keyframes toastIn  { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes toastOut { from{opacity:1} to{opacity:0} }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 768px) {
      #sidebar { display: none; }
      #mobile-lb-toggle { display: flex; }
      .topbar-stat:not(.always-show) { display: none; }
      .topbar-sep { display: none; }
      .topbar-title { display: none; }
    }
    @media (max-width: 480px) {
      #topbar { padding: 0 10px; gap: 8px; }
      .join-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

<!-- ══ JOIN SCREEN ═══════════════════════════════════════════════ -->
<div id="join-screen">
  <div class="join-card">
    <div class="join-logo">· INDEED ·</div>
    <div class="join-ascii">▓█▓ SNAKE ARENA ▓█▓</div>
    <div class="join-subtitle">EAT · GROW · DOMINATE<br>MULTIPLAYER REALTIME</div>
    <div class="join-label">&gt; ENTER NAME:</div>
    <input
      id="name-input"
      class="join-input"
      type="text"
      placeholder="PLAYER_1"
      maxlength="16"
      autocomplete="off"
      spellcheck="false"
    />
    <div class="join-conn-status" id="conn-status">CONNECTING...</div>
    <button class="join-btn" id="join-btn" disabled>[ INSERT COIN ]</button>
    <a href="/" class="join-back">← BACK TO HOME</a>
  </div>
</div>

<!-- ══ GAME SCREEN ════════════════════════════════════════════════ -->
<div id="game-screen" class="hidden">

  <!-- Topbar -->
  <div id="topbar">
    <a href="/" class="topbar-back">← BACK</a>
    <div class="topbar-sep"></div>
    <div class="topbar-title">SNAKE ARENA</div>
    <div class="topbar-spacer"></div>
    <div class="topbar-stat always-show" id="stat-score">
      <span class="topbar-stat-label">SCORE</span>
      <span class="topbar-stat-value score-val" id="my-score">0</span>
    </div>
    <div class="topbar-sep"></div>
    <div class="topbar-stat" id="stat-kills">
      <span class="topbar-stat-label">KILLS</span>
      <span class="topbar-stat-value kills-val" id="my-kills">0</span>
    </div>
    <div class="topbar-sep"></div>
    <div class="topbar-stat" id="stat-online">
      <span class="topbar-stat-label">ONLINE</span>
      <span class="topbar-stat-value online-val" id="online-count">0</span>
    </div>
    <div class="topbar-sep"></div>
    <div class="topbar-player">
      <div class="topbar-dot" id="my-dot"></div>
      <span class="topbar-name" id="my-name-topbar">-</span>
    </div>
  </div>

  <!-- Main area -->
  <div id="main-area">

    <!-- Canvas -->
    <div id="canvas-wrap">
      <canvas id="game-canvas"></canvas>
      <!-- Death overlay -->
      <div id="death-overlay">
        <div class="death-card">
          <div class="death-title">GAME OVER</div>
          <div class="death-killer" id="death-killer-text"></div>
          <div class="death-respawn-label">RESPAWN IN</div>
          <div class="death-countdown" id="death-countdown">3</div>
        </div>
      </div>
    </div>

    <!-- Desktop sidebar -->
    <div id="sidebar">
      <div class="sidebar-header">⚔ KILL BOARD</div>
      <div class="sidebar-col-labels">
        <span class="col-rank">#</span>
        <span class="col-dot"></span>
        <span class="col-name">NAME</span>
        <span class="col-kills">KLL</span>
        <span class="col-score">SCR</span>
      </div>
      <div class="lb-list" id="lb-list-desktop"></div>
      <div class="sidebar-footer">ARROWS / WASD · SWIPE</div>
    </div>
  </div>

  <!-- Mobile leaderboard -->
  <div id="mobile-lb-toggle" onclick="toggleMobileLb()">
    <span id="mobile-lb-label">⚔ KILL BOARD ▲</span>
  </div>
  <div id="mobile-lb-panel">
    <div class="lb-list" id="lb-list-mobile"></div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
// ──────────────────────────────────────────────────────────────────
//  Config — proxy-first, direct fallback
// ──────────────────────────────────────────────────────────────────
const PROXY  = { url: window.location.origin,       path: '/snake-ws/socket.io' };
const DIRECT = { url: 'http://150.158.110.168:3003', path: '/socket.io' };
const GRID = 30;

async function resolveServerConfig() {
  try {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 3000);
    const r = await fetch(PROXY.url + PROXY.path + '/?EIO=4&transport=polling',
                          { signal: ctrl.signal });
    clearTimeout(tid);
    if (r.status < 500) return PROXY;
  } catch (e) { /* proxy unreachable */ }
  return DIRECT;
}

// ──────────────────────────────────────────────────────────────────
//  State
// ──────────────────────────────────────────────────────────────────
let socket       = null;
let myId         = null;
let myColor      = '#39ff14';
let myName       = '';
let gameState    = null;
let isConnected  = false;
let isDead       = false;
let mobileLbOpen = false;

// ──────────────────────────────────────────────────────────────────
//  DOM refs
// ──────────────────────────────────────────────────────────────────
const joinScreen      = document.getElementById('join-screen');
const gameScreen      = document.getElementById('game-screen');
const nameInput       = document.getElementById('name-input');
const joinBtn         = document.getElementById('join-btn');
const connStatus      = document.getElementById('conn-status');
const canvas          = document.getElementById('game-canvas');
const ctx             = canvas.getContext('2d');
const canvasWrap      = document.getElementById('canvas-wrap');
const deathOverlay    = document.getElementById('death-overlay');
const deathKillerText = document.getElementById('death-killer-text');
const deathCountdown  = document.getElementById('death-countdown');
const myScoreEl       = document.getElementById('my-score');
const myKillsEl       = document.getElementById('my-kills');
const onlineEl        = document.getElementById('online-count');
const myDotEl         = document.getElementById('my-dot');
const myNameTopbar    = document.getElementById('my-name-topbar');
const lbDesktop       = document.getElementById('lb-list-desktop');
const lbMobile        = document.getElementById('lb-list-mobile');
const mobileLbToggle  = document.getElementById('mobile-lb-toggle');
const mobileLbPanel   = document.getElementById('mobile-lb-panel');
const toastContainer  = document.getElementById('toast-container');

// ──────────────────────────────────────────────────────────────────
//  Name persistence
// ──────────────────────────────────────────────────────────────────
(function restoreName() {
  const saved = localStorage.getItem('snake_player_name');
  if (saved) nameInput.value = saved;
})();
nameInput.addEventListener('input', () => {
  localStorage.setItem('snake_player_name', nameInput.value.trim());
});

// ──────────────────────────────────────────────────────────────────
//  Socket connection
// ──────────────────────────────────────────────────────────────────
function initSocket(cfg) {
  socket = io(cfg.url, {
    path: cfg.path,
    transports: ['websocket', 'polling'],
    reconnection: true,
    reconnectionDelay: 1000,
    reconnectionAttempts: Infinity,
  });

  socket.on('connect', () => {
    isConnected = true;
    connStatus.textContent = 'CONNECTED ✓';
    connStatus.classList.add('connected');
    joinBtn.disabled = false;
  });

  socket.on('disconnect', () => {
    isConnected = false;
    connStatus.textContent = 'DISCONNECTED — RETRYING...';
    connStatus.classList.remove('connected');
    joinBtn.disabled = true;
    showToast('⚠ CONNECTION LOST');
  });

  socket.on('connect_error', () => {
    connStatus.textContent = 'CONNECT ERROR — RETRYING...';
    connStatus.classList.remove('connected');
  });

  socket.on('joined', ({ id, color }) => {
    myId    = id;
    myColor = color;
    myDotEl.style.background   = color;
    myDotEl.style.boxShadow    = `0 0 6px ${color}`;
    myNameTopbar.textContent   = myName;

    joinScreen.classList.add('hidden');
    gameScreen.classList.remove('hidden');
    resizeCanvas();
    requestAnimationFrame(renderLoop);
  });

  socket.on('game-state', (state) => {
    gameState = state;
    updateHUD(state);
    updateLeaderboard(state);
  });

  socket.on('player-died', ({ id, name, killedBy, killedById }) => {
    if (id === myId) {
      isDead = true;
      showDeathOverlay(killedBy);
    } else {
      if (killedById === myId) {
        showToast(`KILLED ${name.toUpperCase()}  +30  +1K`, true);
      } else if (killedBy) {
        showToast(`${name.toUpperCase()} KILLED BY ${killedBy.toUpperCase()}`);
      } else {
        showToast(`${name.toUpperCase()} HIT A WALL`);
      }
    }
  });

  socket.on('player-respawned', ({ id, name }) => {
    if (id === myId) {
      isDead = false;
      hideDeathOverlay();
      showToast('RESPAWNED — FIGHT!');
    } else {
      showToast(`${name.toUpperCase()} RESPAWNED`);
    }
  });

  socket.on('player-left', ({ id, name }) => {
    if (id !== myId) showToast(`${name.toUpperCase()} LEFT`);
  });
}

// ──────────────────────────────────────────────────────────────────
//  Join
// ──────────────────────────────────────────────────────────────────
joinBtn.addEventListener('click', doJoin);
nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doJoin(); });

function doJoin() {
  if (!isConnected) return;
  const name = nameInput.value.trim() || 'PLAYER';
  myName = name;
  localStorage.setItem('snake_player_name', name);
  socket.emit('join', { name });
}

// ──────────────────────────────────────────────────────────────────
//  Canvas sizing
// ──────────────────────────────────────────────────────────────────
let cellSize = 16;

function resizeCanvas() {
  const wrap = canvasWrap.getBoundingClientRect();
  const avail = Math.min(wrap.width - 4, wrap.height - 4);
  cellSize = Math.max(8, Math.floor(avail / GRID));
  const size = cellSize * GRID;
  canvas.width  = size;
  canvas.height = size;
}
window.addEventListener('resize', resizeCanvas);

// ──────────────────────────────────────────────────────────────────
//  Rendering — retro pixel art style
// ──────────────────────────────────────────────────────────────────
function renderLoop() {
  render();
  requestAnimationFrame(renderLoop);
}

function render() {
  const W  = canvas.width;
  const H  = canvas.height;
  const cs = cellSize;

  // ── Background ──
  ctx.fillStyle = '#020802';
  ctx.fillRect(0, 0, W, H);

  // ── Grid (pixel-art style — subtle green lines) ──
  ctx.strokeStyle = 'rgba(0,100,20,0.25)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= GRID; i++) {
    ctx.beginPath(); ctx.moveTo(i * cs, 0);     ctx.lineTo(i * cs, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * cs);     ctx.lineTo(W, i * cs); ctx.stroke();
  }

  if (!gameState) return;

  const now  = Date.now();
  // Blink food every 400ms (pixel art style)
  const foodOn = Math.floor(now / 280) % 2 === 0;

  // ── Foods ──
  for (const food of gameState.foods) {
    const fx = food.x * cs;
    const fy = food.y * cs;
    const pad = Math.max(1, Math.floor(cs * 0.15));
    const sz  = cs - pad * 2;

    if (foodOn) {
      // Glow hint
      ctx.fillStyle = 'rgba(255,49,49,0.12)';
      ctx.fillRect(fx - 1, fy - 1, cs + 2, cs + 2);
      // Main block
      ctx.fillStyle = '#ff3131';
      ctx.fillRect(fx + pad, fy + pad, sz, sz);
      // Pixel highlight (top-left)
      ctx.fillStyle = '#ff8888';
      ctx.fillRect(fx + pad, fy + pad, Math.max(2, Math.floor(sz * 0.35)), Math.max(2, Math.floor(sz * 0.35)));
    } else {
      // Off — dim
      ctx.fillStyle = '#661111';
      ctx.fillRect(fx + pad, fy + pad, sz, sz);
    }
  }

  // ── Snakes ──
  for (const player of gameState.players) {
    if (!player.alive || !player.snake || player.snake.length === 0) continue;
    drawSnake(player, now);
  }

  // ── Name labels ──
  for (const player of gameState.players) {
    if (!player.alive || !player.snake || player.snake.length === 0) continue;
    drawNameLabel(player);
  }

  // ── Death countdown ──
  if (isDead && myId) {
    const me = gameState.players.find(p => p.id === myId);
    if (me && !me.alive && me.respawnIn != null) {
      deathCountdown.textContent = me.respawnIn;
    }
  }
}

function drawSnake(player, now) {
  const cs   = cellSize;
  const isMe = player.id === myId;
  const col  = player.color;
  const len  = player.snake.length;

  // Pre-parse hex color → r,g,b for alpha segments
  const r = parseInt(col.slice(1,3),16);
  const g = parseInt(col.slice(3,5),16);
  const b = parseInt(col.slice(5,7),16);

  for (let i = len - 1; i >= 0; i--) {
    const seg    = player.snake[i];
    const isHead = i === 0;
    const tAlpha = len > 1 ? Math.max(0.25, 1 - (i / (len - 1)) * 0.72) : 1;

    const pad = isHead ? 1 : 2;
    const sx  = seg.x * cs + pad;
    const sy  = seg.y * cs + pad;
    const sz  = cs - pad * 2;

    if (isHead && isMe) {
      // Outer glow for own head
      ctx.shadowColor = col;
      ctx.shadowBlur  = 14;
    } else if (isHead) {
      ctx.shadowColor = col;
      ctx.shadowBlur  = 6;
    } else {
      ctx.shadowBlur  = 0;
    }

    ctx.fillStyle   = `rgba(${r},${g},${b},${tAlpha})`;
    ctx.fillRect(sx, sy, sz, sz);

    if (isHead) {
      ctx.shadowBlur = 0;

      // Darker inner square (pixel detail)
      const inner = Math.floor(sz * 0.25);
      ctx.fillStyle = `rgba(0,0,0,0.3)`;
      ctx.fillRect(sx + inner, sy + inner, sz - inner * 2, sz - inner * 2);

      // Eyes — pixel dots
      const dir    = player.dir || { x: 1, y: 0 };
      const perpX  = dir.y;
      const perpY  = -dir.x;
      const eyeSz  = Math.max(2, Math.floor(cs * 0.12));
      const eyeOff = cs * 0.2;
      const fwdOff = cs * 0.16;
      const ex     = seg.x * cs + cs / 2;
      const ey_    = seg.y * cs + cs / 2;
      const fwdX   = dir.x * fwdOff;
      const fwdY   = dir.y * fwdOff;

      ctx.fillStyle = '#fff';
      ctx.fillRect(
        Math.round(ex + fwdX + perpX * eyeOff - eyeSz / 2),
        Math.round(ey_ + fwdY + perpY * eyeOff - eyeSz / 2),
        eyeSz, eyeSz
      );
      ctx.fillRect(
        Math.round(ex + fwdX - perpX * eyeOff - eyeSz / 2),
        Math.round(ey_ + fwdY - perpY * eyeOff - eyeSz / 2),
        eyeSz, eyeSz
      );

      // Pixel highlight on head corner
      ctx.fillStyle = `rgba(${r},${g},${b},0.6)`;
      ctx.fillRect(sx, sy, 2, 2);
    }
  }

  ctx.shadowBlur = 0;
}

function drawNameLabel(player) {
  const cs   = cellSize;
  const head = player.snake[0];
  if (!head) return;
  const isMe = player.id === myId;
  const label = (isMe ? '► ' : '') + player.name.toUpperCase();
  const fontSize = Math.max(6, Math.floor(cs * 0.38));

  ctx.save();
  ctx.font      = `${fontSize}px "Press Start 2P", monospace`;
  ctx.textAlign = 'center';

  const tw  = ctx.measureText(label).width;
  const pad = 4;
  const bw  = tw + pad * 2;
  const bh  = fontSize + pad * 2;
  const bx  = head.x * cs + cs / 2 - bw / 2;
  const by  = head.y * cs - bh - 2;

  // BG
  ctx.fillStyle = 'rgba(0,0,0,0.82)';
  ctx.fillRect(bx, by, bw, bh);
  // Border
  ctx.strokeStyle = isMe ? player.color : 'rgba(255,255,255,0.2)';
  ctx.lineWidth   = 1;
  ctx.strokeRect(bx, by, bw, bh);
  // Text
  ctx.fillStyle   = isMe ? player.color : 'rgba(255,255,255,0.75)';
  ctx.textBaseline = 'top';
  ctx.fillText(label, head.x * cs + cs / 2, by + pad);

  ctx.restore();
}

// ──────────────────────────────────────────────────────────────────
//  HUD
// ──────────────────────────────────────────────────────────────────
function updateHUD(state) {
  const me = myId ? state.players.find(p => p.id === myId) : null;
  if (me) {
    myScoreEl.textContent = String(me.score).padStart(4, '0');
    myKillsEl.textContent = String(me.kills).padStart(2, '0');
  }
  onlineEl.textContent = state.players.length;
}

// ──────────────────────────────────────────────────────────────────
//  Leaderboard — ranked by kills, score as tiebreak
// ──────────────────────────────────────────────────────────────────
function updateLeaderboard(state) {
  const html = buildLeaderboardHtml(state);
  lbDesktop.innerHTML = html;
  lbMobile.innerHTML  = html;
}

function buildLeaderboardHtml(state) {
  const sorted = [...state.players].sort(
    (a, b) => (b.kills - a.kills) || (b.score - a.score)
  );
  const RANK_CHARS = ['1', '2', '3'];
  return sorted.map((p, i) => {
    const isMe = p.id === myId;
    const dead = !p.alive;
    const rank = i < 3 ? RANK_CHARS[i] : String(i + 1);
    return `<div class="lb-item${isMe ? ' mine' : ''}${dead ? ' dead' : ''}">
      <span class="lb-rank">${rank}</span>
      <span class="lb-dot" style="background:${p.color};box-shadow:0 0 4px ${p.color}"></span>
      <span class="lb-name">${dead ? '✕' : ''}${escapeHtml(p.name.toUpperCase())}</span>
      <span class="lb-kills">${String(p.kills).padStart(2,'0')}</span>
      <span class="lb-score">${String(p.score).padStart(4,'0')}</span>
    </div>`;
  }).join('');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ──────────────────────────────────────────────────────────────────
//  Death overlay
// ──────────────────────────────────────────────────────────────────
function showDeathOverlay(killedBy) {
  deathOverlay.classList.add('visible');
  deathKillerText.innerHTML = killedBy
    ? `KILLED BY <strong>${escapeHtml(killedBy.toUpperCase())}</strong>`
    : 'HIT A WALL';
  deathCountdown.textContent = '3';
}
function hideDeathOverlay() {
  deathOverlay.classList.remove('visible');
}

// ──────────────────────────────────────────────────────────────────
//  Toast
// ──────────────────────────────────────────────────────────────────
function showToast(msg, isKill = false) {
  const el = document.createElement('div');
  el.className = 'toast' + (isKill ? ' kill-toast' : '');
  el.textContent = msg;
  toastContainer.appendChild(el);
  setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 2800);
}

// ──────────────────────────────────────────────────────────────────
//  Mobile leaderboard toggle
// ──────────────────────────────────────────────────────────────────
function toggleMobileLb() {
  mobileLbOpen = !mobileLbOpen;
  mobileLbPanel.classList.toggle('open', mobileLbOpen);
  document.getElementById('mobile-lb-label').textContent =
    mobileLbOpen ? '⚔ KILL BOARD ▼' : '⚔ KILL BOARD ▲';
}

// ──────────────────────────────────────────────────────────────────
//  Keyboard controls
// ──────────────────────────────────────────────────────────────────
const KEY_MAP = {
  ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
  w:'up', W:'up', s:'down', S:'down', a:'left', A:'left', d:'right', D:'right',
};
document.addEventListener('keydown', (e) => {
  const dir = KEY_MAP[e.key];
  if (dir && socket && myId) { e.preventDefault(); socket.emit('direction', dir); }
});

// ──────────────────────────────────────────────────────────────────
//  Touch / swipe
// ──────────────────────────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0;
const MIN_SWIPE = 15;

canvas.addEventListener('touchstart', (e) => {
  touchStartX = e.changedTouches[0].clientX;
  touchStartY = e.changedTouches[0].clientY;
}, { passive: true });

canvas.addEventListener('touchend', (e) => {
  if (!socket || !myId) return;
  const dx  = e.changedTouches[0].clientX - touchStartX;
  const dy  = e.changedTouches[0].clientY - touchStartY;
  const adx = Math.abs(dx), ady = Math.abs(dy);
  if (Math.max(adx, ady) < MIN_SWIPE) return;
  socket.emit('direction', adx > ady ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up'));
}, { passive: true });

canvas.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });

// ──────────────────────────────────────────────────────────────────
//  Init — probe proxy, then connect
// ──────────────────────────────────────────────────────────────────
(async () => {
  connStatus.textContent = 'DETECTING SERVER...';
  const cfg = await resolveServerConfig();
  console.log('[snake] server config:', cfg.url, cfg.path);
  initSocket(cfg);
})();

const gameScreenObserver = new MutationObserver(() => {
  if (!gameScreen.classList.contains('hidden')) {
    resizeCanvas();
    gameScreenObserver.disconnect();
  }
});
gameScreenObserver.observe(gameScreen, { attributes: true, attributeFilter: ['class'] });
</script>
