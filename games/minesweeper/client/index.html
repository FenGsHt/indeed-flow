<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多人实时扫雷</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>💣 多人实时扫雷</h1>
    
    <!-- 房间加入界面 -->
    <div id="join-screen" class="screen">
      <div class="join-form">
        <h2>加入房间</h2>
        <div class="form-group">
          <label>房间号：</label>
          <input type="text" id="room-id" placeholder="例如: room-123" />
        </div>
        <div class="form-group">
          <label>你的名字：</label>
          <input type="text" id="player-name" placeholder="例如: 玩家1" />
        </div>
        <button id="join-btn" class="btn">加入游戏</button>
        <p id="join-error" class="error"></p>
      </div>
    </div>

    <!-- 游戏界面 -->
    <div id="game-screen" class="screen hidden">
      <div class="game-header">
        <div class="room-info">
          <span>房间: <strong id="current-room"></strong></span>
          <button id="leave-btn" class="btn-small">离开房间</button>
        </div>
        
        <!-- 玩家列表 -->
        <div class="players-list" id="players-list">
          <span class="players-title">在线玩家:</span>
        </div>
      </div>

      <div class="game-info">
        <span>🚩 旗帜: <span id="flag-count">0</span>/<span id="mine-count">10</span></span>
        <span id="game-status">等待开始...</span>
        <button id="new-game-btn" class="btn-small">新游戏</button>
      </div>

      <div id="board" class="board"></div>
      
      <!-- 游戏结束弹窗 -->
      <div id="game-over-modal" class="modal hidden">
        <div class="modal-content">
          <h2 id="game-over-title">游戏结束</h2>
          <p id="game-over-message"></p>
          <button id="restart-btn" class="btn">再来一局</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
