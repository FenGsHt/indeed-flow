<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多人实时扫雷</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>💣 多人实时扫雷</h1>

    <!-- 大厅界面 -->
    <div id="join-screen" class="screen">
      <div class="lobby-layout">

        <!-- 左侧：房间列表 -->
        <div class="lobby-left">
          <div class="name-row">
            <input type="text" id="player-name" placeholder="输入你的名字" maxlength="12" />
          </div>

          <div class="rooms-header">
            <h2>🚪 房间列表</h2>
            <button id="refresh-btn" class="btn-icon" title="刷新">🔄</button>
          </div>

          <div id="room-list" class="room-list">
            <div class="room-empty">暂无房间，创建一个吧！</div>
          </div>

          <!-- 创建房间区域 -->
          <div class="create-area">
            <div class="create-header" id="create-toggle">
              <span>＋ 创建新房间</span>
              <span class="create-arrow">▾</span>
            </div>
            <div class="create-body" id="create-body">
              <div class="preset-row">
                <span class="preset-label">快速预设：</span>
                <button class="btn-preset" data-w="9" data-h="9" data-m="10">初级</button>
                <button class="btn-preset" data-w="16" data-h="16" data-m="40">中级</button>
                <button class="btn-preset" data-w="30" data-h="16" data-m="99">高级</button>
              </div>
              <div class="custom-inputs">
                <div class="custom-field">
                  <label>宽</label>
                  <input type="number" id="board-width" value="16" min="5" max="50" />
                </div>
                <div class="custom-field">
                  <label>高</label>
                  <input type="number" id="board-height" value="16" min="5" max="30" />
                </div>
                <div class="custom-field">
                  <label>雷数</label>
                  <input type="number" id="board-mines" value="40" min="1" max="500" />
                </div>
              </div>
              <button id="create-room-btn" class="btn create-btn">创建并加入</button>
            </div>
          </div>

          <p id="join-error" class="error"></p>
        </div>

        <!-- 右侧：暴雷榜 -->
        <div class="lobby-right">
          <h2>💥 暴雷榜</h2>
          <p class="leaderboard-hint">踩雷次数越多，越光荣！</p>
          <div id="leaderboard" class="leaderboard">
            <div class="leaderboard-empty">暂无记录</div>
          </div>
        </div>

      </div>
    </div>

    <!-- 游戏界面 -->
    <div id="game-screen" class="screen hidden">
      <div class="game-header">
        <div class="room-info">
          <span>房间: <strong id="current-room"></strong></span>
          <span id="board-size-info" class="board-size-info"></span>
          <button id="leave-btn" class="btn-small">离开房间</button>
        </div>
        <div class="players-list" id="players-list">
          <span class="players-title">在线玩家:</span>
        </div>
      </div>

      <div class="game-info">
        <span>🚩 <span id="flag-count">0</span> / <span id="mine-count">0</span></span>
        <span id="game-status">等待开始...</span>
        <button id="new-game-btn" class="btn-small">新游戏</button>
      </div>

      <div class="game-area">
        <div class="board-wrapper">
          <div id="board" class="board"></div>
          <div class="scroll-hint scroll-hint-right"><span>›</span></div>
          <div class="scroll-hint scroll-hint-left"><span>‹</span></div>
          <div class="scroll-hint scroll-hint-bottom"><span>⌄</span></div>
          <div class="scroll-hint scroll-hint-top"><span>⌃</span></div>
        </div>

        <!-- 游戏内暴雷榜 -->
        <div class="ingame-leaderboard">
          <div class="ingame-lb-title" id="lb-toggle">
            💥 暴雷榜 <span class="lb-arrow">▾</span>
          </div>
          <div id="ingame-lb-body" class="ingame-lb-body">
            <div id="ingame-leaderboard"></div>
          </div>
        </div>
      </div>

      <!-- 游戏结束弹窗 -->
      <div id="game-over-modal" class="modal hidden">
        <div class="modal-content">
          <h2 id="game-over-title">游戏结束</h2>
          <p id="game-over-message"></p>
          <button id="restart-btn" class="btn">再来一局</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
