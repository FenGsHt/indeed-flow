<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INDEED - Game Backlog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <!-- Hero Section -->
  <header class="hero-section">
    <div class="featured-game" id="featured-game">
      <div class="featured-image-wrapper" id="featured-image">
        <div class="featured-placeholder">🎮</div>
      </div>
      <div class="featured-meta">
        <div class="featured-title" id="featured-title">选择游戏</div>
        <div class="featured-time" id="featured-time">0 HRS</div>
      </div>
    </div>

    <div class="hero-stats">
      <div class="stat-block-large">
        <div class="stat-number" id="stat-games">0<span style="font-size:3rem;color:rgba(0,0,0,0.4)"> / 365</span></div>
        <div class="stat-label">Games Total</div>
      </div>
      <div class="hero-details">
        <div class="detail-col">
          <span class="detail-label">Current Focus</span>
          <p>评分 &middot; 留言 &middot; 推荐</p>
        </div>
        <div class="detail-col">
          <span class="detail-label">This Year</span>
          <p id="stat-year">0 games played</p>
        </div>
      </div>
    </div>

    <div class="hero-title-vertical">BACKLOG</div>
  </header>

  <!-- List Section -->
  <main class="list-section">
    <div class="list-header-bar">
      <div class="tabs">
        <div class="tab active" data-tab="library">Library</div>
        <div class="tab" data-tab="wishlist">Wishlist</div>
        <div class="tab" data-tab="stats">Stats</div>
      </div>
      <div class="list-actions">
        <div class="barcode"></div>
        <button class="btn" id="add-game-btn">+ Add Game</button>
      </div>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="🔍 Search games...">
        <select id="sort-select">
          <option value="default">Default</option>
          <option value="name">Name A-Z</option>
          <option value="rating">Rating</option>
          <option value="newest">Newest</option>
        </select>
      </div>
    </div>

    <!-- Library Tab -->
    <div class="tab-content active" id="tab-library">
      <div class="data-grid">
        <div class="grid-header">
          <div>No.</div>
          <div>Cover</div>
          <div>Title</div>
          <div>Genre</div>
          <div>Status</div>
          <div style="text-align:right">Menu</div>
        </div>
        <div id="games-list"></div>
      </div>
    </div>

    <!-- Wishlist Tab -->
    <div class="tab-content" id="tab-wishlist">
      <div class="empty-hint">愿望单开发中...</div>
    </div>

    <!-- Stats Tab -->
    <div class="tab-content" id="tab-stats">
      <div class="stats-page">
        <div class="stats-card">
          <div class="stat-num" id="stat-ratings">0</div>
          <div class="stat-label">Total Ratings</div>
        </div>
        <div class="stats-card">
          <div class="stat-num" id="stat-comments">0</div>
          <div class="stat-label">Comments</div>
        </div>
        <div class="stats-card">
          <div class="stat-num" id="stat-added-this-year">0</div>
          <div class="stat-label">Added This Year</div>
        </div>
      </div>
    </div>
  </main>

  <!-- Add Game Modal -->
  <div id="add-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>Add New Game</h3>
      <div class="form-group">
        <input type="text" id="game-name" placeholder="Game Name *" autocomplete="off">
        <button id="search-steam-btn" class="btn-small">🔍 Steam</button>
        <div id="steam-results" class="steam-results"></div>
      </div>
      <div class="form-group">
        <input type="text" id="game-image" placeholder="Image URL (optional)" autocomplete="off">
        <div id="image-preview" class="image-preview"></div>
      </div>
      <div class="form-group">
        <input type="text" id="game-user" placeholder="Your Name" autocomplete="off">
      </div>
      <div class="form-group">
        <select id="game-status">
          <option value="backlog">Backlog</option>
          <option value="playing">Playing</option>
          <option value="completed">Completed</option>
        </select>
      </div>
      <div class="form-group">
        <input type="text" id="game-tags" placeholder="Tags (comma separated)" autocomplete="off">
      </div>
      <div class="modal-actions">
        <button class="btn" id="confirm-add">Add Game</button>
        <button class="btn btn-secondary" onclick="closeModal('add-modal')">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Game Detail Modal -->
  <div id="detail-modal" class="modal" style="display:none;">
    <div class="modal-content detail-content" id="detail-content">
    </div>
  </div>

  <!-- Nav for News (hidden on desktop) -->
  <nav class="mobile-nav">
    <a href="#" class="nav-link active" data-page="library">Library</a>
    <a href="#" class="nav-link" data-page="news">News</a>
  </nav>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
