<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INDEED - 待玩游戏</title>
  <link rel="stylesheet" href="/src/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1 class="logo">INDEED</h1>
      <nav class="main-nav">
        <a href="#" class="nav-link active" data-page="home">首页</a>
        <a href="#" class="nav-link" data-page="games">待玩游戏</a>
        <a href="#" class="nav-link" data-page="news">新闻专区</a>
        <button id="theme-toggle" class="theme-btn" title="切换夜间模式">🌙</button>
      </nav>
    </header>
    
    <!-- 首页 -->
    <main id="home-page" class="page active">
      <div class="hero">
        <p class="hero-text">发现 &middot; 评分 &middot; 推荐</p>
      </div>
    </main>
    
    <!-- 游戏列表页 -->
    <main id="games-page" class="page">
      <div class="page-header">
        <h2>待玩游戏</h2>
        <p class="page-desc">点击游戏进行评分和留言</p>
      </div>
      
      <div class="toolbar">
        <input type="text" id="search-games" class="search-input" placeholder="🔍 搜索游戏...">
        <select id="sort-games" class="sort-select">
          <option value="time">按添加时间</option>
          <option value="rating">按评分</option>
          <option value="name">按名称</option>
        </select>
        <button id="add-game-btn" class="btn btn-primary">
          <span class="btn-icon">+</span> 添加游戏
        </button>
        <span class="games-count">共 <span id="total-games">0</span> 款</span>
      </div>
      
      <div id="games-list" class="games-grid"></div>
    </main>
    
    <!-- 新闻专区页 -->
    <main id="news-page" class="page">
      <div class="page-header">
        <h2>📰 新闻专区</h2>
      </div>
      
      <div class="news-tabs">
        <button class="news-tab active" data-tab="hot">🔥 热点专区</button>
        <button class="news-tab" data-tab="iran">⚔️ 伊朗战争</button>
      </div>
      
      <!-- 热点专区 -->
      <div id="hot-tab" class="news-tab-content active">
        <div class="public-hot" id="public-hot">
          <h3>🌐 公共热点</h3>
          <div class="loading">加载中...</div>
        </div>
        
        <div class="hot-platform">
          <h3>📌 贴吧热点</h3>
          <ul class="hot-list" id="tieba-hot"></ul>
        </div>
        
        <div class="hot-platform">
          <h3>📌 微博热搜</h3>
          <ul class="hot-list" id="weibo-hot"></ul>
        </div>
        
        <div class="hot-platform">
          <h3>📌 B站热点</h3>
          <ul class="hot-list" id="bilibili-hot"></ul>
        </div>
        
        <div class="hot-platform">
          <h3>📌 抖音热点</h3>
          <ul class="hot-list" id="douyin-hot"></ul>
        </div>
        
        <div class="hot-platform">
          <h3>📌 小红书热点</h3>
          <ul class="hot-list" id="xiaohongshu-hot"></ul>
        </div>
      </div>
      
      <!-- 伊朗战争专区 -->
      <div id="iran-tab" class="news-tab-content">
        <div class="iran-news" id="iran-news">
          <div class="loading">加载中...</div>
        </div>
      </div>
    </main>
  </div>
  
  <!-- 添加游戏弹窗 -->
  <div id="add-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>添加新游戏</h3>
      <div class="form-group">
        <input type="text" id="game-name" placeholder="游戏名称 *" autocomplete="off">
      </div>
      <div class="form-group">
        <input type="text" id="game-image" placeholder="图片URL (可选)" autocomplete="off">
      </div>
      <div class="form-group">
        <input type="text" id="game-user" placeholder="你的名字" autocomplete="off">
      </div>
      <div id="image-preview" class="image-preview"></div>
      <div class="modal-actions">
        <button id="confirm-add" class="btn btn-primary">确认</button>
        <button id="cancel-add" class="btn btn-secondary">取消</button>
      </div>
    </div>
  </div>
  
  <!-- 游戏详情弹窗 -->
  <div id="detail-modal" class="modal" style="display:none;">
    <div class="modal-content game-detail">
      <div id="detail-content"></div>
    </div>
  </div>
  
  <script type="module" src="/src/main.js"></script>
</body>
</html>
