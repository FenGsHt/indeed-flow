<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INDEED - 游戏库</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #16213e 100%);
      color: #fff;
      overflow-x: hidden;
    }

    /* 背景动画 */
    .bg-effect {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .bg-effect::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle at 20% 80%, rgba(123, 47, 247, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 80% 20%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 40% 40%, rgba(255, 0, 110, 0.1) 0%, transparent 30%);
      animation: bgMove 20s ease-in-out infinite;
    }

    @keyframes bgMove {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(-5%, -5%) rotate(5deg); }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* 头部 */
    .header {
      text-align: center;
      padding: 2rem 0 3rem;
    }

    .logo {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      background: linear-gradient(90deg, #00d4ff, #7b2ff7, #ff006e, #00d4ff);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: logoShine 3s ease-in-out infinite;
      margin-bottom: 0.5rem;
    }

    @keyframes logoShine {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .slogan {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.3em;
    }

    /* Tab导航 */
    .nav-tabs {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .nav-tab {
      padding: 0.8rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.6);
      border-radius: 50px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-tab:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-2px);
    }

    .nav-tab.active {
      background: linear-gradient(90deg, #00d4ff, #7b2ff7);
      color: #fff;
      box-shadow: 0 4px 20px rgba(0,212,255,0.3);
    }

    .nav-tab .icon {
      font-size: 1.2rem;
    }

    /* 内容区 */
    .tab-content {
      display: none;
      animation: fadeIn 0.4s ease;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 新闻子Tab */
    .sub-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      padding: 0.3rem;
      background: rgba(255,255,255,0.05);
      border-radius: 50px;
      width: fit-content;
    }

    .sub-tab {
      padding: 0.5rem 1.2rem;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.6);
      border-radius: 50px;
      transition: all 0.3s;
    }

    .sub-tab.active {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    .btn-ai-summary {
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: linear-gradient(135deg, rgba(123,47,247,0.3), rgba(0,212,255,0.3));
      color: #fff;
      border-radius: 50px;
      transition: all 0.3s;
      border: 1px solid rgba(123,47,247,0.5);
    }

    .btn-ai-summary:hover {
      background: linear-gradient(135deg, rgba(123,47,247,0.5), rgba(0,212,255,0.5));
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(123,47,247,0.3);
    }

    /* 游戏网格 */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1.25rem;
    }

    .game-card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .game-card:hover {
      transform: translateY(-8px) scale(1.02);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      border-color: rgba(0,212,255,0.3);
    }

    .game-cover {
      width: 100%;
      height: 140px;
      background: linear-gradient(135deg, #ff6b6b 0%, #4ecdc4 50%, #45b7d1 100%);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .game-cover.has-image {
      background: none;
    }

    .cover-placeholder {
      font-size: 3rem;
      opacity: 0.5;
    }

    .steam-btn {
      position: absolute;
      bottom: 8px;
      right: 8px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.6);
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .steam-btn:hover {
      background: #171a21;
      transform: scale(1.1);
    }

    .steam-btn.success {
      background: #4caf50;
    }

    .status-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 1.2rem;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    .game-info {
      padding: 1rem;
    }

    .game-name {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 0.3rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .game-meta {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
    }

    /* 新闻列表 */
    .news-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .news-item {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid transparent;
    }

    .news-item:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.1);
      transform: translateX(4px);
    }

    .news-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .news-source {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .news-source.tieba { background: #00aaff; color: #fff; }
    .news-source.douyin { background: #000; color: #fff; }
    .news-source.weibo { background: #ff0000; color: #fff; }
    .news-source.bilibili { background: #00aaff; color: #fff; }
    .news-source.iran { background: #ff6b6b; color: #fff; }

    .news-time {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
    }

    .news-title {
      font-size: 1rem;
      font-weight: 500;
      line-height: 1.4;
    }

    .news-summary {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      margin-top: 0.5rem;
      line-height: 1.5;
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: rgba(255,255,255,0.4);
    }

    .empty-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .empty-text {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }

    .empty-hint {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.3);
    }

    /* 添加游戏按钮 */
    .add-game-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #00d4ff, #7b2ff7);
      color: #fff;
      font-size: 1.8rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,212,255,0.4);
      transition: all 0.3s;
      z-index: 100;
    }

    .add-game-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 30px rgba(0,212,255,0.5);
    }

    /* 弹窗 */
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(5px);
    }

    .modal.show { display: flex; }

    .modal-content {
      background: #1a1a3e;
      border-radius: 20px;
      padding: 2rem;
      width: 90%;
      max-width: 400px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .modal-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 0.4rem;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 0.8rem;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 0.95rem;
    }

    .form-group input:focus {
      outline: none;
      border-color: #00d4ff;
    }

    .modal-actions {
      display: flex;
      gap: 0.8rem;
      margin-top: 1.5rem;
    }

    .btn {
      flex: 1;
      padding: 0.8rem;
      border-radius: 10px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00d4ff, #7b2ff7);
      color: #fff;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .btn-danger {
      background: #ff4757;
      color: #fff;
    }

    .btn-steam {
      background: linear-gradient(135deg, #1b2838, #2a475e);
      color: #fff;
      border: 1px solid #66c0f4;
    }

    .btn-steam:hover {
      background: linear-gradient(135deg, #2a475e, #66c0f4);
    }

    .btn:active { transform: scale(0.95); }

    /* 加载动画 */
    .loading {
      display: flex;
      justify-content: center;
      padding: 3rem;
    }

    .loading::after {
      content: '';
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 移动端适配 */
    @media (max-width: 600px) {
      .container { padding: 1rem; }
      .nav-tab { padding: 0.6rem 1.2rem; font-size: 0.9rem; }
      .games-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
      .game-cover { height: 100px; }
    }
  </style>
</head>
<body>
  <div class="bg-effect"></div>

  <!-- 添加游戏弹窗 -->
  <div id="add-modal" class="modal">
    <div class="modal-content">
      <div class="modal-title">➕ 添加游戏</div>
      <div class="form-group">
        <label>游戏名称 *</label>
        <input type="text" id="game-name" placeholder="输入游戏名称">
      </div>
      <div class="form-group">
        <label>Steam地址（可选）</label>
        <input type="text" id="game-url" placeholder="https://store.steampowered.com/app/...">
      </div>
      <div class="form-group">
        <label>你的昵称</label>
        <input type="text" id="game-user" placeholder="Anonymous">
      </div>
      <div class="form-group">
        <label>游玩状态</label>
        <select id="game-status">
          <option value="backlog">待玩</option>
          <option value="playing">正在游玩</option>
          <option value="completed">已玩</option>
        </select>
      </div>
      <div class="form-group">
        <label>优先级（1-100，数字越小越靠前）</label>
        <input type="number" id="game-priority" value="100" min="1" max="100">
      </div>
      <div class="form-group">
        <label>游戏图片（上传图片或从Steam搜图）</label>
        <div style="display:flex;gap:0.5rem;align-items:flex-start;flex-wrap:wrap;">
          <label for="game-image-file" style="flex:1;min-width:120px;padding:0.6rem 1rem;background:rgba(255,255,255,0.1);border-radius:8px;cursor:pointer;text-align:center;font-size:0.85rem;border:1px dashed rgba(255,255,255,0.3);">
            📁 上传图片
            <input type="file" id="game-image-file" accept="image/*" style="display:none;" onchange="handleImageUpload(this)">
          </label>
          <button type="button" class="btn btn-steam" onclick="searchSteamForGame()" style="padding:0.5rem 1rem;font-size:0.85rem;white-space:nowrap;">🔍 Steam搜图</button>
        </div>
        <input type="hidden" id="game-image-url" value="">
        <div id="image-preview" style="margin-top:0.5rem;max-width:100%;max-height:150px;overflow:hidden;border-radius:8px;display:none;"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="addGame()">添加并获取好评率</button>
        <button class="btn btn-secondary" onclick="closeModal('add-modal')">取消</button>
      </div>
    </div>
  </div>

  <!-- 游戏详情弹窗 -->
  <div id="detail-modal" class="modal">
    <div class="modal-content">
      <div class="modal-title" id="detail-title">游戏详情</div>
      <div class="form-group">
        <label>状态</label>
        <select id="detail-status">
          <option value="backlog">待玩</option>
          <option value="playing">正在游玩</option>
          <option value="completed">已玩</option>
        </select>
      </div>
      <div class="form-group">
        <label>优先级（1-100）</label>
        <input type="number" id="detail-priority" min="1" max="100" value="100">
      </div>
      <div class="form-group">
        <label>游戏图片</label>
        <div style="display:flex;gap:0.5rem;align-items:flex-start;flex-wrap:wrap;">
          <label for="detail-image-file" style="flex:1;min-width:120px;padding:0.6rem 1rem;background:rgba(255,255,255,0.1);border-radius:8px;cursor:pointer;text-align:center;font-size:0.85rem;border:1px dashed rgba(255,255,255,0.3);">
            📁 上传图片
            <input type="file" id="detail-image-file" accept="image/*" style="display:none;" onchange="handleDetailImageUpload(this)">
          </label>
          <button type="button" class="btn btn-steam" onclick="searchSteamForDetail()" style="padding:0.5rem 1rem;font-size:0.85rem;white-space:nowrap;">🔍 Steam搜图</button>
        </div>
        <input type="hidden" id="detail-image" value="">
        <div id="detail-image-preview" style="margin-top:0.5rem;max-width:100%;max-height:150px;overflow:hidden;border-radius:8px;display:none;"></div>
      </div>
      <div class="form-group">
        <label>Steam地址</label>
        <input type="text" id="detail-url" placeholder="Steam链接">
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="updateGame()">保存</button>
        <button class="btn btn-danger" onclick="deleteGame()">删除</button>
        <button class="btn btn-secondary" onclick="closeModal('detail-modal')">关闭</button>
      </div>
    </div>
  </div>

  <!-- AI 简介弹窗 -->
  <div id="ai-summary-modal" class="modal">
    <div class="modal-content" style="max-width:500px;">
      <div class="modal-title">🤖 AI 热点总结</div>
      <div id="ai-summary-content" style="padding:1rem;line-height:1.8;color:rgba(255,255,255,0.9);">
        <div class="loading"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('ai-summary-modal')">关闭</button>
      </div>
    </div>
  </div>

  <div class="container">
    <header class="header">
      <h1 class="logo">INDEED</h1>
      <p class="slogan">发现 · 评分 · 推荐</p>
    </header>

    <!-- 主导航 -->
    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="game">
        <span class="icon">🎮</span> 游戏库
      </button>
      <button class="nav-tab" data-tab="news">
        <span class="icon">📰</span> 新闻
      </button>
    </div>

    <!-- 游戏内容 -->
    <div id="tab-game" class="tab-content active">
      <div id="games-list" class="games-grid">
        <div class="loading"></div>
      </div>
      <button class="add-game-btn" onclick="openAddModal()">+</button>
    </div>

    <!-- 新闻内容 -->
    <div id="tab-news" class="tab-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <div class="sub-tabs">
          <button class="sub-tab active" data-news="hot">🔥 热点</button>
          <button class="sub-tab" data-news="iran">🇮🇷 伊朗</button>
        </div>
      </div>

      <div id="news-hot" class="news-content">
        <div id="hot-list" class="news-list">
          <div class="loading"></div>
        </div>
      </div>

      <div id="news-iran" class="news-content" style="display:none;">
        <div id="iran-list" class="news-list">
          <div class="loading"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://150.158.110.168:5001';

    // ============ 图片上传处理 ============
    async function handleImageUpload(input) {
      const file = input.files[0];
      if (!file) return;

      const preview = document.getElementById('image-preview');
      const urlInput = document.getElementById('game-image-url');

      // 读取文件并转换为base64
      const reader = new FileReader();
      reader.onload = function(e) {
        const b64 = e.target.result;
        urlInput.value = b64;
        preview.style.display = 'block';
        preview.innerHTML = '<img src="' + b64 + '" style="width:100%;height:150px;object-fit:cover;">';
      };
      reader.readAsDataURL(file);
    }

    async function handleDetailImageUpload(input) {
      const file = input.files[0];
      if (!file) return;

      const preview = document.getElementById('detail-image-preview');
      const urlInput = document.getElementById('detail-image');

      const reader = new FileReader();
      reader.onload = function(e) {
        const b64 = e.target.result;
        urlInput.value = b64;
        preview.style.display = 'block';
        preview.innerHTML = '<img src="' + b64 + '" style="width:100%;height:150px;object-fit:cover;">';
      };
      reader.readAsDataURL(file);
    }

    // ============ Steam 搜图（自动下载转base64） ============
    async function searchSteamForGame() {
      const gameName = document.getElementById('game-name').value.trim();
      const urlInput = document.getElementById('game-image-url');
      const preview = document.getElementById('image-preview');

      if (!gameName) return alert('请先输入游戏名称');

      const btn = event.target;
      const originalText = btn.textContent;
      btn.textContent = '⏳ 搜索中...';
      btn.disabled = true;

      try {
        // 使用新的自动搜索接口，直接返回base64图片
        const res = await fetch(API_BASE + '/api/search-steam-auto?q=' + encodeURIComponent(gameName));
        const data = await res.json();

        if (data.success && data.image) {
          urlInput.value = data.image;
          preview.style.display = 'block';
          preview.innerHTML = '<img src="' + data.image + '" style="width:100%;height:150px;object-fit:cover;">';
          btn.textContent = '✓ 已获取';
          btn.style.background = 'linear-gradient(135deg, #00d4ff, #7b2ff7)';
        } else {
          alert(data.error || '未找到游戏图片');
          btn.textContent = '✗ 未找到';
          setTimeout(() => { btn.textContent = originalText; }, 2000);
        }
      } catch(e) {
        alert('搜索失败，请手动上传图片');
        btn.textContent = originalText;
      } finally {
        btn.disabled = false;
      }
    }

    // 详情页Steam搜图
    async function searchSteamForDetail() {
      if (!currentGame) return;
      
      const btn = event.target;
      const originalText = btn.textContent;
      btn.textContent = '⏳ 搜索中...';
      btn.disabled = true;

      try {
        const res = await fetch(API_BASE + '/api/search-steam-auto?q=' + encodeURIComponent(currentGame.name));
        const data = await res.json();

        if (data.success && data.image) {
          document.getElementById('detail-image').value = data.image;
          const preview = document.getElementById('detail-image-preview');
          preview.style.display = 'block';
          preview.innerHTML = '<img src="' + data.image + '" style="width:100%;height:150px;object-fit:cover;">';
          btn.textContent = '✓ 已获取';
          btn.style.background = 'linear-gradient(135deg, #00d4ff, #7b2ff7)';
        } else {
          alert(data.error || '未找到游戏图片');
          btn.textContent = '✗ 未找到';
          setTimeout(() => { btn.textContent = originalText; }, 2000);
        }
      } catch(e) {
        alert('搜索失败');
        btn.textContent = originalText;
      } finally {
        btn.disabled = false;
      }
    }

    // Tab切换
    document.querySelectorAll('.nav-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('tab-' + this.dataset.tab).classList.add('active');
      });
    });

    // 新闻子Tab
    document.querySelectorAll('.sub-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        document.getElementById('news-hot').style.display = this.dataset.news === 'hot' ? 'block' : 'none';
        document.getElementById('news-iran').style.display = this.dataset.news === 'iran' ? 'block' : 'none';
      });
    });

    // 加载游戏
    async function loadGames() {
      const list = document.getElementById('games-list');
      try {
        let games = [];
        try {
          const res = await fetch(API_BASE + '/api/games');
          if (res.ok) games = await res.json();
        } catch(e) { console.log('API fail'); }

        if (games.length === 0) {
          try {
            const res = await fetch('/data/games.json');
            games = await res.json();
          } catch {}
        }

        if (games.length === 0) {
          list.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">🎮</div>
              <div class="empty-text">暂无游戏</div>
              <div class="empty-hint">点击添加你的第一个游戏</div>
            </div>`;
          return;
        }

        // 排序：优先级（越小越前）+ 字母顺序
        games.sort((a, b) => {
          const pa = a.priority || 100;
          const pb = b.priority || 100;
          if (pa !== pb) return pa - pb;
          return a.name.localeCompare(b.name);
        });

        list.innerHTML = games.slice(0, 12).map((g, i) => {
          // 根据游戏名生成唯一渐变色
          const hash = g.name.split('').reduce((a,c) => a+c.charCodeAt(0), 0);
          const hue1 = hash % 360;
          const hue2 = (hash * 2) % 360;
          const gradient = `linear-gradient(135deg, hsl(${hue1}, 70%, 50%) 0%, hsl(${hue2}, 60%, 40%) 100%)`;

          const statusMap = {backlog: '📋 待玩', playing: '🎮 正在游玩', completed: '✅ 已玩'};
          const statusIcon = statusMap[g.status] || '📋 待玩';

          // 计算好评率
          let ratingText = '';
          if (g.ratings && Object.keys(g.ratings).length > 0) {
            const sum = Object.values(g.ratings).reduce((a,b) => a+b, 0);
            const avg = sum / Object.keys(g.ratings).length;
            ratingText = `⭐ ${avg.toFixed(1)}`;
          }

          return `
          <div class="game-card" style="animation-delay: ${i*0.05}s" onclick='onGameCardClick(${JSON.stringify(g).replace(/'/g,"\\'")})'>
            <div class="game-cover" style="background: ${g.image ? 'url(' + g.image + '),' + gradient : gradient}; background-size: cover;">
              <span class="status-badge" title="${g.status || 'backlog'}">${statusIcon}</span>
              <button class="steam-btn" onclick="event.stopPropagation(); searchSteam('${g.name.replace(/'/g,"\\'")}', this)" title="换封面">🎨</button>
            </div>
            <div class="game-info">
              <div class="game-name">${g.name}</div>
              <div class="game-meta">${g.created_by || 'Anonymous'} ${ratingText}</div>
            </div>
          </div>`;
        }).join('');
      } catch {
        list.innerHTML = `<div class="empty-state"><div class="empty-text">加载失败</div></div>`;
      }
    }

    // 搜索Steam图片
    async function searchSteam(gameName, btn) {
      btn.textContent = '⏳';
      try {
        // 尝试后端API
        const res = await fetch(API_BASE + '/api/search-steam?q=' + encodeURIComponent(gameName));
        const data = await res.json();
        if (data.headerUrl) {
          btn.parentElement.style.background = 'url(' + data.headerUrl + ')';
          btn.parentElement.style.backgroundSize = 'cover';
          btn.classList.add('success');
          btn.textContent = '✓';
          return;
        }
      } catch {}

      // API失败时，随机换一个酷炫的渐变
      const hues = [
        [349, 280], [45, 180], [200, 320], [150, 220], [280, 350],
        [30, 120], [180, 260], [320, 40], [260, 340], [90, 170]
      ];
      const [h1, h2] = hues[Math.floor(Math.random() * hues.length)];
      btn.parentElement.style.background = `linear-gradient(135deg, hsl(${h1}, 70%, 50%), hsl(${h2}, 60%, 40%))`;
      btn.classList.add('success');
      btn.textContent = '🎨';
    }

    // 加载热点 - 从后端API实时获取
    async function loadHot() {
      const list = document.getElementById('hot-list');
      list.innerHTML = '<div class="loading"></div>';

      try {
        // 优先调用后端API获取实时热点
        const res = await fetch(API_BASE + '/api/news/hot');
        let data;

        if (res.ok) {
          data = await res.json();
        } else {
          // 后端失败时回退到静态文件
          const fallbackRes = await fetch('/data/news.json');
          data = await fallbackRes.json();
        }

        // 获取AI总结
        let summaryHtml = '';
        try {
          const summaryRes = await fetch(API_BASE + '/api/news/summary');
          if (summaryRes.ok) {
            const summaryData = await summaryRes.json();
            if (summaryData.hot && summaryData.hot.summary && summaryData.hot.summary !== '暂无摘要') {
              summaryHtml = `
                <div style="margin-bottom:1.5rem;padding:1rem;background:linear-gradient(135deg,rgba(123,47,247,0.2),rgba(0,212,255,0.2));border-radius:12px;border:1px solid rgba(123,47,247,0.3);">
                  <div style="font-size:0.75rem;color:#00d4ff;margin-bottom:0.5rem;display:flex;align-items:center;gap:0.3rem;">
                    <span>🤖</span> AI 热点总结
                    <span style="margin-left:auto;font-size:0.65rem;color:rgba(255,255,255,0.4);">${summaryData.updated || ''}</span>
                  </div>
                  <div style="font-size:0.9rem;line-height:1.6;color:rgba(255,255,255,0.9);">${summaryData.hot.summary}</div>
                </div>`;
            }
          }
        } catch(e) {
          console.log('AI summary fetch error:', e);
        }

        const sources = [
          {key: 'tieba', name: '贴吧', class: 'tieba'},
          {key: 'weibo', name: '微博', class: 'weibo'},
          {key: 'bilibili', name: 'B站', class: 'bilibili'},
          {key: 'douyin', name: '抖音', class: 'douyin'},
          {key: 'xiaohongshu', name: '小红书', class: 'xiaohongshu'}
        ];

        let html = summaryHtml;
        let hasAnyData = summaryHtml !== '';

        sources.forEach(s => {
          const items = data[s.key] || [];
          // 检查是否有有效数据
          const validItems = items.filter(item => item.title && item.title !== '获取失败');

          if (validItems.length > 0) {
            hasAnyData = true;
            html += `<div style="margin-bottom:1.5rem;"><div style="font-size:0.8rem;color:rgba(255,255,255,0.4);margin-bottom:0.5rem;padding-left:0.5rem;">${s.name}</div>`;
            validItems.slice(0, 5).forEach((item, i) => {
              // 对标题进行转义以避免JavaScript错误
              const safeTitle = item.title.replace(/'/g, "\\'").replace(/"/g, '&quot;');
              html += `
                <div class="news-item" style="animation-delay: ${i*0.03}s">
                  <div class="news-header">
                    <span class="news-source ${s.class}">${s.name}</span>
                    <button class="btn-ai-summary" onclick="showItemAISummary('${safeTitle}', '${item.url || ''}', '${s.name}')" style="margin-left:auto;padding:0.3rem 0.6rem;font-size:0.7rem;">
                      🤖 AI总结
                    </button>
                  </div>
                  <div class="news-title" onclick="window.open('${item.url||'#'}','_blank')" style="cursor:pointer;">${item.title}</div>
                </div>`;
            });
            html += '</div>';
          } else {
            // 显示获取失败
            html += `<div style="margin-bottom:1rem;padding:0.8rem;background:rgba(255,255,255,0.05);border-radius:8px;">
              <span style="font-size:0.8rem;color:rgba(255,255,255,0.4);">${s.name}</span>
              <span style="font-size:0.75rem;color:#ff6b6b;margin-left:0.5rem;">获取失败</span>
            </div>`;
          }
        });

        // 公共热点
        if (data.public && data.public.length > 0) {
          hasAnyData = true;
          html += `<div style="margin-bottom:1.5rem;"><div style="font-size:0.8rem;color:rgba(255,255,255,0.4);margin-bottom:0.5rem;padding-left:0.5rem;">🔥 公共热点</div>`;
          data.public.slice(0, 5).forEach((item, i) => {
            html += `
              <div class="news-item" style="animation-delay: ${i*0.03}s">
                <div class="news-header">
                  <span class="news-source" style="background:linear-gradient(135deg,#ff6b6b,#ff8e53);">公共</span>
                  <span style="font-size:0.7rem;color:rgba(255,255,255,0.4);">${item.platforms.join(', ')}</span>
                </div>
                <div class="news-title">${item.topic}</div>
              </div>`;
          });
          html += '</div>';
        }

        if (!hasAnyData) {
          list.innerHTML = `<div class="empty-state"><div class="empty-text">暂无热点数据</div></div>`;
          return;
        }

        // 添加更新时间
        if (data.updated) {
          html += `<div style="text-align:center;padding:1rem;font-size:0.7rem;color:rgba(255,255,255,0.3);">更新时间: ${data.updated}</div>`;
        }

        list.innerHTML = html;
      } catch(e) {
        console.error('Load hot news error:', e);
        list.innerHTML = `<div class="empty-state"><div class="empty-text">加载失败</div><div class="empty-hint">${e.message}</div></div>`;
      }
    }

    // 加载伊朗 - 从后端API实时获取
    async function loadIran() {
      const list = document.getElementById('iran-list');
      list.innerHTML = '<div class="loading"></div>';

      try {
        // 从后端API获取实时伊朗新闻
        const res = await fetch(API_BASE + '/api/news/iran');
        let data;

        if (res.ok) {
          data = await res.json();
        } else {
          // 后端失败时回退到静态文件
          const fallbackRes = await fetch('/data/news.json');
          data = await fallbackRes.json();
        }

        const news = data.articles || [];

        const translations = {
          "Who is Mojtaba Khamenei, Iran's new supreme leader?": "伊朗新最高领袖是谁？",
          "'Night turned into day': Iranians tell of strikes on oil depots": "伊朗人讲述石油设施遭袭",
          "'Mind boggles' at doubts over legality of war": "对战争合法性质疑",
          "Israel and Iran": "以色列和伊朗",
          "US Iran attacks": "美国伊朗袭击"
        };

        if (news.length === 0) {
          list.innerHTML = `<div class="empty-state"><div class="empty-text">暂无新闻</div></div>`;
          return;
        }

        list.innerHTML = news.map((n, i) => {
          const title = translations[n.title] || n.title;
          return `
            <div class="news-item" style="animation-delay: ${i*0.03}s">
              <div class="news-header">
                <span class="news-source iran">🇮🇷 伊朗</span>
                <span class="news-time">${n.time || ''}</span>
              </div>
              <div class="news-title">${title}</div>
              ${n.summary ? `<div class="news-summary">${n.summary.substring(0,100)}...</div>` : ''}
            </div>
          `;
        }).join('');
      } catch {
        list.innerHTML = `<div class="empty-state"><div class="empty-text">加载失败</div></div>`;
      }
    }

    // 当前选中的游戏
    let currentGame = null;    
    // 图片URL预览功能
    function previewImageFromUrl(url) {
      const preview = document.getElementById('image-preview');
      if (!url) {
        preview.style.display = 'none';
        preview.innerHTML = '';
        return;
      }
      preview.style.display = 'block';
      preview.innerHTML = '<img src="' + url + '" style="width:100%;height:150px;object-fit:cover;" onerror="this.parentElement.style.display=\'none\'">';
    }

    // 从Steam搜索游戏图片
    async function searchSteamForGame() {
      const gameName = document.getElementById('game-name').value.trim();
      const urlInput = document.getElementById('game-image-url');
      const preview = document.getElementById('image-preview');

      if (!gameName) return alert('请先输入游戏名称');

      const btn = event.target;
      const originalText = btn.textContent;
      btn.textContent = '⏳ 搜索中...';
      btn.disabled = true;

      try {
        const res = await fetch(API_BASE + '/api/search-steam?q=' + encodeURIComponent(gameName));
        const data = await res.json();

        if (data.headerUrl) {
          urlInput.value = data.headerUrl;
          preview.style.display = 'block';
          preview.innerHTML = '<img src="' + data.headerUrl + '" style="width:100%;height:150px;object-fit:cover;">';
          btn.textContent = '✓ 已获取';
          btn.style.background = 'linear-gradient(135deg, #00d4ff, #7b2ff7)';
        } else {
          btn.textContent = '✗ 未找到';
          setTimeout(() => { btn.textContent = originalText; }, 2000);
        }
      } catch(e) {
        alert('搜索失败，请手动输入图片URL');
        btn.textContent = originalText;
      } finally {
        btn.disabled = false;
      }
    }

    // 打开添加弹窗
    function openAddModal() {
      document.getElementById('game-name').value = '';
      document.getElementById('game-user').value = '';
      document.getElementById('add-modal').classList.add('show');
    }

    // 显示AI热点总结
    async function showAISummary() {
      const modal = document.getElementById('ai-summary-modal');
      const content = document.getElementById('ai-summary-content');

      modal.classList.add('show');
      content.innerHTML = '<div class="loading"></div>';

      try {
        const res = await fetch(API_BASE + '/api/news/summary');
        if (!res.ok) throw new Error('请求失败');

        const data = await res.json();

        if (data.hot && data.hot.summary) {
          content.innerHTML = `
            <div style="margin-bottom:1rem;padding:1rem;background:linear-gradient(135deg,rgba(123,47,247,0.2),rgba(0,212,255,0.2));border-radius:12px;border:1px solid rgba(123,47,247,0.3);">
              <div style="font-size:0.75rem;color:#00d4ff;margin-bottom:0.5rem;">
                <span>🤖</span> 热点总结
                <span style="margin-left:auto;font-size:0.65rem;color:rgba(255,255,255,0.4);">${data.updated || ''}</span>
              </div>
              <div style="font-size:0.95rem;line-height:1.8;color:rgba(255,255,255,0.95);">${data.hot.summary}</div>
            </div>
            ${data.iran ? `
            <div style="margin-top:1rem;padding:1rem;background:linear-gradient(135deg,rgba(255,107,107,0.2),rgba(255,0,110,0.2));border-radius:12px;border:1px solid rgba(255,107,107,0.3);">
              <div style="font-size:0.75rem;color:#ff6b6b;margin-bottom:0.5rem;">
                <span>🇮🇷</span> 伊朗热点
                <span style="margin-left:auto;font-size:0.65rem;color:rgba(255,255,255,0.4);">${data.iran.updated || ''}</span>
              </div>
              <div style="font-size:0.95rem;line-height:1.8;color:rgba(255,255,255,0.95);">${data.iran.summary}</div>
            </div>` : ''}
          `;
        } else {
          content.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.5);padding:2rem;">暂无AI总结数据</div>';
        }
      } catch(e) {
        content.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.5);padding:2rem;">加载失败，请稍后重试</div>';
      }
    }

    // 显示单个新闻的AI总结
    async function showItemAISummary(title, url, source) {
      event.stopPropagation(); // 阻止冒泡
      
      const modal = document.getElementById('ai-summary-modal');
      const content = document.getElementById('ai-summary-content');

      modal.classList.add('show');
      content.innerHTML = '<div class="loading"></div>';

      try {
        const res = await fetch(API_BASE + '/api/news/summary/item', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({title, url, source})
        });
        
        if (!res.ok) throw new Error('请求失败');

        const data = await res.json();

        if (data.success && data.summary) {
          content.innerHTML = `
            <div style="margin-bottom:1rem;">
              <div style="font-size:0.8rem;color:#00d4ff;margin-bottom:0.8rem;padding-bottom:0.5rem;border-bottom:1px solid rgba(255,255,255,0.1);">
                <span>🤖</span> ${data.title}
              </div>
              <div style="font-size:0.95rem;line-height:1.8;color:rgba(255,255,255,0.95);white-space:pre-wrap;">${data.summary}</div>
              ${url ? `<a href="${url}" target="_blank" style="display:inline-block;margin-top:1rem;padding:0.5rem 1rem;background:rgba(0,212,255,0.2);border-radius:20px;color:#00d4ff;text-decoration:none;font-size:0.85rem;">查看原文 →</a>` : ''}
            </div>
          `;
        } else {
          content.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.5);padding:2rem;">无法获取总结</div>';
        }
      } catch(e) {
        content.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.5);padding:2rem;">加载失败，请稍后重试</div>';
      }
    }

    // 关闭弹窗
    function closeModal(id) {
      document.getElementById(id).classList.remove('show');
    }

    // 添加游戏
    async function addGame() {
      const name = document.getElementById('game-name').value.trim();
      const url = document.getElementById('game-url').value.trim();
      const user = document.getElementById('game-user').value.trim() || 'Anonymous';
      const status = document.getElementById('game-status').value;
      const priority = parseInt(document.getElementById('game-priority').value) || 100;
      const image = document.getElementById('game-image-url').value.trim();

      if (!name) return alert('请输入游戏名称');

      try {
        // 先添加游戏
        await fetch(API_BASE + '/api/games', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({name, url, user, status, priority, image})
        });

        // 重置表单
        document.getElementById('game-image-url').value = '';
        document.getElementById('image-preview').style.display = 'none';

        // 如果有Steam地址，尝试获取好评率
        if (url && url.includes('steampowered.com/app/')) {
          const appId = url.match(/app\/(\d+)/);
          if (appId) {
            try {
              const res = await fetch(API_BASE + '/api/steam-game/' + appId[1]);
              const data = await res.json();
              if (data.positiveRatio !== undefined) {
                // 更新好评率
                await fetch(API_BASE + '/api/games/' + name + '/rate', {
                  method: 'POST',
                  headers: {'Content-Type': 'application/json'},
                  body: JSON.stringify({user: 'steam', score: Math.ceil(data.positiveRatio / 20)})
                });
              }
            } catch(e) { console.log('获取好评率失败', e); }
          }
        }

        closeModal('add-modal');
        loadGames();
      } catch {
        alert('添加失败，请重试');
      }
    }

    // 打开详情弹窗
    function openDetail(game) {
      currentGame = game;
      document.getElementById('detail-title').textContent = game.name;
      document.getElementById('detail-status').value = game.status || 'backlog';
      document.getElementById('detail-priority').value = game.priority || 100;
      document.getElementById('detail-image').value = game.image || '';
      document.getElementById('detail-url').value = game.url || '';
      
      // 显示现有图片预览
      const preview = document.getElementById('detail-image-preview');
      if (game.image) {
        preview.style.display = 'block';
        preview.innerHTML = '<img src="' + game.image + '" style="width:100%;height:150px;object-fit:cover;">';
      } else {
        preview.style.display = 'none';
        preview.innerHTML = '';
      }
      
      document.getElementById('detail-modal').classList.add('show');
    }

    // 更新游戏
    async function updateGame() {
      if (!currentGame) return;
      const status = document.getElementById('detail-status').value;
      const priority = parseInt(document.getElementById('detail-priority').value) || 100;
      const image = document.getElementById('detail-image').value;
      const url = document.getElementById('detail-url').value;

      try {
        await fetch(API_BASE + '/api/games/' + currentGame.id, {
          method: 'PUT',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({status, priority, image, url})
        });
        closeModal('detail-modal');
        loadGames();
      } catch {
        alert('更新失败');
      }
    }

    // 删除游戏
    async function deleteGame() {
      if (!currentGame) return;
      if (!confirm('确定删除 ' + currentGame.name + '？')) return;

      try {
        await fetch(API_BASE + '/api/games/' + currentGame.id, {method: 'DELETE'});
        closeModal('detail-modal');
        loadGames();
      } catch {
        alert('删除失败');
      }
    }

    // 点击卡片打开详情
    function onGameCardClick(g) {
      openDetail(g);
    }

    loadGames();
    loadHot();
    loadIran();
  </script>
</body>
</html>
