<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INDEED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
    }
    
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    
    .hero-title {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 900;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #00d4ff, #7b2ff7, #ff006e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .hero-subtitle {
      font-size: 1rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 3rem;
    }
    
    .tabs {
      display: flex;
      gap: 1rem;
      background: rgba(255,255,255,0.1);
      padding: 0.5rem;
      border-radius: 50px;
      backdrop-filter: blur(10px);
    }
    
    .tab {
      padding: 1rem 3rem;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      border-radius: 50px;
      transition: all 0.3s;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.7);
    }
    
    .tab.active {
      background: linear-gradient(90deg, #00d4ff, #7b2ff7);
      color: #fff;
      box-shadow: 0 4px 20px rgba(0,212,255,0.4);
    }
    
    .tab:hover:not(.active) {
      background: rgba(255,255,255,0.1);
    }
    
    .tab-content {
      display: none;
      width: 100%;
      max-width: 1200px;
      padding: 2rem;
    }
    
    .tab-content.active {
      display: block;
    }
    
    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid rgba(255,255,255,0.2);
    }
    
    /* 游戏列表样式 */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.5rem;
    }
    
    .game-card {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 1rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .game-card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.15);
    }
    
    .game-cover {
      width: 100%;
      height: 120px;
      background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
      border-radius: 12px;
      margin-bottom: 0.75rem;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .steam-btn {
      background: rgba(0,0,0,0.6);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
    }
    
    .steam-btn:hover {
      background: rgba(0,0,0,0.8);
      transform: scale(1.1);
    }
    
    .game-name {
      font-weight: 700;
      font-size: 0.9rem;
    }
    
    .game-meta {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      margin-top: 0.25rem;
    }
    
    /* 新闻列表样式 */
    .news-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .news-item {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .news-item:hover {
      background: rgba(255,255,255,0.15);
    }
    
    .news-source {
      font-size: 0.7rem;
      color: #00d4ff;
      text-transform: uppercase;
      font-weight: 700;
    }
    
    .news-title {
      font-size: 1rem;
      font-weight: 600;
      margin: 0.5rem 0;
    }
    
    .empty-hint {
      text-align: center;
      padding: 3rem;
      color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1 class="hero-title">INDEED</h1>
    <p class="hero-subtitle">发现 · 评分 · 推荐</p>
    
    <div class="tabs">
      <button class="tab active" data-tab="game">🎮 游戏</button>
      <button class="tab" data-tab="news">📰 新闻</button>
    </div>
    
    <!-- 游戏专区 -->
    <div class="tab-content active" id="tab-game">
      <h2 class="section-title">🎮 游戏库</h2>
      <div id="games-list" class="games-grid">
        <div class="empty-hint">加载中...</div>
      </div>
    </div>
    
    <!-- 新闻专区 -->
    <div class="tab-content" id="tab-news">
      <div class="tabs" style="margin-bottom:1.5rem;background:transparent;padding:0;">
        <button class="tab active" data-news="hot">🔥 热点</button>
        <button class="tab" data-news="iran">🇮🇷 伊朗</button>
      </div>
      
      <div id="news-hot" class="news-content">
        <div id="hot-list" class="news-list">
          <div class="empty-hint">加载中...</div>
        </div>
      </div>
      <div id="news-iran" class="news-content" style="display:none;">
        <div id="iran-list" class="news-list">
          <div class="empty-hint">加载中...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://150.158.110.168:5001';
    
    // Tab切换
    document.querySelectorAll('.tab[data-tab]').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab[data-tab]').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });
    
    // 新闻Tab切换
    document.querySelectorAll('.tab[data-news]').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab[data-news]').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('news-hot').style.display = tab.dataset.news === 'hot' ? 'block' : 'none';
        document.getElementById('news-iran').style.display = tab.dataset.news === 'iran' ? 'block' : 'none';
      });
    });
    
    // 加载游戏（带本地后备）
    async function loadGames() {
      const list = document.getElementById('games-list');
      try {
        let games = [];
        try {
          const res = await fetch(API_BASE + '/api/games');
          if (res.ok) games = await res.json();
        } catch(e) { console.log('API失败，用本地数据'); }
        
        // 后备：本地数据
        if (games.length === 0) {
          try {
            const res = await fetch('/data/games.json');
            games = await res.json();
          } catch {}
        }
        
        if (games.length === 0) {
          list.innerHTML = '<div class="empty-hint">暂无游戏，去添加一个吧！</div>';
          return;
        }
        list.innerHTML = games.slice(0, 12).map(g => `
          <div class="game-card">
            <div class="game-cover" style="${g.image ? 'background-image:url(' + g.image + ');background-size:cover' : ''}" data-game="${g.name}">
              <button class="steam-btn" onclick="searchSteamImage('${g.name}', this)">🔍</button>
            </div>
            <div class="game-name">${g.name}</div>
            <div class="game-meta">${g.created_by || 'Anonymous'}</div>
          </div>
        `).join('');
      } catch {
        list.innerHTML = '<div class="empty-hint">加载失败</div>';
      }
    }
    
    // 加载热点（贴吧+抖音+微博+B站）
    async function loadHot() {
      const list = document.getElementById('hot-list');
      try {
        const res = await fetch('/data/news.json');
        const data = await res.json();
        // 贴吧、抖音、微博、B站热点
        const all = [
          ...(data.tieba||[]).map(i => ({...i, source: '贴吧'})),
          ...(data.douyin||[]).map(i => ({...i, source: '抖音'})),
          ...(data.weibo||[]).map(i => ({...i, source: '微博'})),
          ...(data.bilibili||[]).map(i => ({...i, source: 'B站'}))
        ].filter(n => n.title && n.title !== '获取失败').slice(0,20);
        
        list.innerHTML = all.map(n => `
          <div class="news-item" onclick="window.open('${n.url||'#'}','_blank')">
            <div class="news-source" style="color:${n.source==='贴吧'?'#00aaff':n.source==='抖音'?'#000':n.source==='微博'?'#ff0000':n.source==='B站'?'#00aaff':'#fff'}">${n.source}</div>
            <div class="news-title">${n.title}</div>
          </div>
        `).join('') || '<div class="empty-hint">暂无热点，稍后再试</div>';
      } catch(e) {
        list.innerHTML = '<div class="empty-hint">加载失败: ' + e.message + '</div>';
      }
    }
    
    // 加载伊朗（翻译成中文）
    async function loadIran() {
      const list = document.getElementById('iran-list');
      try {
        const res = await fetch('/data/news.json');
        const data = await res.json();
        const news = data.iran || [];
        
        // 翻译映射
        const translations = {
          "Who is Mojtaba Khamenei, Iran's new supreme leader?": "伊朗新最高领袖是谁？莫伊巴塔·哈梅内伊",
          "'Night turned into day': Iranians tell of strikes on oil depots": "'夜晚变白昼'：伊朗人讲述石油设施遭袭击",
          "'Mind boggles' at doubts over legality of war, Israeli president says": "以色列总统：对战争合法性质疑令人震惊",
          "Iran war": "伊朗战争",
          "US Iran attack": "美国伊朗袭击"
        };
        
        list.innerHTML = news.map(n => {
          const title = translations[n.title] || n.title;
          const summary = n.summary ? (translations[n.summary.substring(0,50)] || n.summary) : '';
          return `
            <div class="news-item">
              <div class="news-source" style="color:#ff6b6b">🇮🇷 伊朗</div>
              <div class="news-title">${title}</div>
              ${summary ? `<div style="font-size:0.8rem;color:rgba(255,255,255,0.6);margin-top:0.5rem">${summary}</div>` : ''}
            </div>
          `;
        }).join('') || '<div class="empty-hint">暂无新闻</div>';
      } catch(e) {
        list.innerHTML = '<div class="empty-hint">加载失败</div>';
      }
    }
    
    // 搜索Steam图片
    async function searchSteamImage(gameName, btn) {
      btn.textContent = '...';
      try {
        const res = await fetch(API_BASE + '/api/search-steam?q=' + encodeURIComponent(gameName));
        const data = await res.json();
        if (data.headerUrl) {
          btn.parentElement.style.backgroundImage = 'url(' + data.headerUrl + ')';
          btn.parentElement.style.backgroundSize = 'cover';
          btn.style.display = 'none';
        } else {
          btn.textContent = '❌';
          setTimeout(() => btn.textContent = '🔍', 2000);
        }
      } catch(e) {
        btn.textContent = '❌';
        setTimeout(() => btn.textContent = '🔍', 2000);
      }
    }
    
    loadGames();
    loadHot();
    loadIran();
  </script>
</body>
</html>
