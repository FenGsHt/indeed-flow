name: Build and Deploy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy files with retry
        uses: nick-fields/retry@v2
        with:
          max_attempts: 3
          retry_wait_seconds: 15
          timeout_minutes: 10
          command: |
            scp -i ~/.ssh/id_rsa -r dist/* \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}

      - name: Start Flask backend with retry
        uses: nick-fields/retry@v2
        with:
          max_attempts: 3
          retry_wait_seconds: 10
          timeout_minutes: 5
          command: |
            ssh -i ~/.ssh/id_rsa \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "sudo systemctl restart flask-app && sleep 2 && sudo systemctl is-active flask-app"

      - name: Notify success
        if: success()
        run: |
          curl "https://api.day.app/${{ secrets.BARK_KEY }}/部署成功/indeed-flow%20构建部署完成"

      - name: Notify failure
        if: failure()
        run: |
          curl "https://api.day.app/${{ secrets.BARK_KEY }}/部署失败/indeed-flow%20构建异常"
