name: Build and Deploy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy files with retry
        uses: nick-fields/retry@v2
        with:
          max_attempts: 3
          retry_wait_seconds: 15
          timeout_minutes: 10
          command: |
            scp -i ~/.ssh/id_rsa -r dist/* \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}

      - name: Deploy backend files
        uses: nick-fields/retry@v2
        with:
          max_attempts: 3
          retry_wait_seconds: 15
          timeout_minutes: 10
          command: |
            scp -i ~/.ssh/id_rsa app.py games_api.py \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/1panel/apps/openclaw/openclaw/data/conf/workspace-work-agent/indeed-flow/

      - name: Restart Flask backend
        uses: nick-fields/retry@v2
        with:
          max_attempts: 3
          retry_wait_seconds: 10
          timeout_minutes: 5
          command: |
            ssh -i ~/.ssh/id_rsa \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "cd /opt/1panel/apps/openclaw/openclaw/data/conf/workspace-work-agent/indeed-flow && echo 'DB_HOST=${{ secrets.DB_HOST }}' > .env && echo 'DB_PORT=${{ secrets.DB_PORT }}' >> .env && echo 'DB_USER=${{ secrets.DB_USER }}' >> .env && echo 'DB_PASSWORD=${{ secrets.DB_PASSWORD }}' >> .env && echo 'DB_NAME=${{ secrets.DB_NAME }}' >> .env && sudo systemctl restart flask-app && sleep 2 && sudo systemctl is-active flask-app"

      - name: Notify success
        if: success()
        run: |
          curl -s "https://api.day.app/${{ secrets.BARK_KEY }}/部署成功/indeed-flow%20构建部署完成" || true
          curl -s -X POST "http://150.158.110.168:18789/hooks/github" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=${{ secrets.HOOKS_TOKEN }}" \
            -d '{"status": "success", "message": "✅ 部署成功！indeed-flow 已上线"}' || true
          # 发送到 QQ 群
          curl -s -X POST "http://150.158.110.168:3001/send_group_msg" \
            -H "Content-Type: application/json" \
            -d "{\"group_id\":\"859294429\",\"message\":\"🚀 indeed-flow 部署成功！\\n\\n提交：$(echo '${{ github.event.head_commit.message }}' | head -1)\\n作者：${{ github.event.head_commit.author.name }}\\n\\n请刷新页面查看最新版本。\"}" || true

      - name: Notify failure
        if: failure()
        run: |
          curl -s "https://api.day.app/${{ secrets.BARK_KEY }}/部署失败/indeed-flow%20构建异常" || true
          curl -s -X POST "http://150.158.110.168:18789/hooks/github" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=${{ secrets.HOOKS_TOKEN }}" \
            -d '{"status": "failure", "message": "❌ 部署失败！请检查 Actions"}' || true
          # 发送到 QQ 群
          curl -s -X POST "http://150.158.110.168:3001/send_group_msg" \
            -H "Content-Type: application/json" \
            -d "{\"group_id\":\"859294429\",\"message\":\"❌ indeed-flow 部署失败！\\n\\n提交：$(echo '${{ github.event.head_commit.message }}' | head -1)\\n作者：${{ github.event.head_commit.author.name }}\\n\\n请检查 GitHub Actions 日志。\"}" || true
