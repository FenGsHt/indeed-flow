name: Build and Deploy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare prod directory
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "mkdir -p ${{ secrets.SERVER_PATH }}/games/minesweeper/client \
                      ${{ secrets.SERVER_PATH }}/games/minesweeper/scripts \
                      ${{ secrets.SERVER_PATH }}/games/minesweeper/server \
                      ${{ secrets.SERVER_PATH }}/backend && \
             sudo chown -R \$(whoami) ${{ secrets.SERVER_PATH }}"

      - name: Deploy frontend (dist)
        run: |
          rsync -az -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}/

      - name: Deploy static game pages
        uses: nick-fields/retry@v2
        with:
          max_attempts: 3
          retry_wait_seconds: 15
          timeout_minutes: 10
          command: |
            scp -i ~/.ssh/id_rsa games.html \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}/

      - name: Deploy minesweeper client
        uses: nick-fields/retry@v2
        with:
          max_attempts: 3
          retry_wait_seconds: 15
          timeout_minutes: 10
          command: |
            scp -i ~/.ssh/id_rsa \
              games/minesweeper/client/index.html \
              games/minesweeper/client/app.js \
              games/minesweeper/client/style.css \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}/games/minesweeper/client/
            scp -i ~/.ssh/id_rsa \
              games/minesweeper/ecosystem.config.js \
              games/minesweeper/README.md \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}/games/minesweeper/
            scp -i ~/.ssh/id_rsa \
              games/minesweeper/scripts/monitor.sh \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}/games/minesweeper/scripts/

      - name: Deploy minesweeper server
        uses: nick-fields/retry@v2
        with:
          max_attempts: 3
          retry_wait_seconds: 15
          timeout_minutes: 10
          command: |
            scp -i ~/.ssh/id_rsa -r games/minesweeper/server/* \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}/games/minesweeper/server/

      - name: Start minesweeper server
        uses: nick-fields/retry@v2
        with:
          max_attempts: 3
          retry_wait_seconds: 10
          timeout_minutes: 5
          command: |
            ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "export NVM_DIR=\$HOME/.nvm && . \$NVM_DIR/nvm.sh && \
               cd ${{ secrets.SERVER_PATH }}/games/minesweeper/server && \
               (md5sum package.json > /tmp/pkg_hash_new && \
                (diff -q /tmp/pkg_hash_new /tmp/pkg_hash_old > /dev/null 2>&1 || \
                 (npm install --no-audit && cp /tmp/pkg_hash_new /tmp/pkg_hash_old))) && \
               pm2 stop minesweeper-server 2>/dev/null; \
               pm2 delete minesweeper-server 2>/dev/null; \
               pm2 start server.js --name minesweeper-server && \
               pm2 save"

      - name: Deploy backend
        uses: nick-fields/retry@v2
        with:
          max_attempts: 3
          retry_wait_seconds: 15
          timeout_minutes: 10
          command: |
            scp -i ~/.ssh/id_rsa backend/app.py backend/games_api.py \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}/backend/

      - name: Restart Flask backend
        uses: nick-fields/retry@v2
        with:
          max_attempts: 3
          retry_wait_seconds: 10
          timeout_minutes: 5
          command: |
            ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "cd ${{ secrets.SERVER_PATH }}/backend && \
               echo 'DB_HOST=${{ secrets.DB_HOST }}' > .env && \
               echo 'DB_PORT=${{ secrets.DB_PORT }}' >> .env && \
               echo 'DB_USER=${{ secrets.DB_USER }}' >> .env && \
               echo 'DB_PASSWORD=${{ secrets.DB_PASSWORD }}' >> .env && \
               echo 'DB_NAME=${{ secrets.DB_NAME }}' >> .env && \
               echo 'FLASK_DEBUG=false' >> .env && \
               sudo systemctl restart flask-app && \
               sleep 2 && \
               sudo systemctl is-active flask-app"

      - name: Notify success
        if: success()
        run: |
          curl -s "https://api.day.app/${{ secrets.BARK_KEY }}/部署成功/indeed-flow%20构建部署完成" || true

      - name: Notify failure
        if: failure()
        run: |
          curl -s "https://api.day.app/${{ secrets.BARK_KEY }}/部署失败/indeed-flow%20构建异常" || true
