name: Daily Steam Price Check

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 02:00 UTC = 北京时间 10:00
  workflow_dispatch:        # 支持手动触发

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Run Steam price check on server
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd ${{ secrets.SERVER_PATH }}/backend && python3 steam_price_check.py"

      - name: Notify failure
        if: failure()
        run: |
          curl -s "https://api.day.app/${{ secrets.BARK_KEY }}/Steam折扣检测失败/每日价格检测脚本执行异常" || true
