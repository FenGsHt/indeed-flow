<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/auth-gate.js"></script>
  <title>AI 助手测试 - INDEED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      height: 100vh;
      background: #0f0f23;
      color: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: linear-gradient(135deg, #1a1a3e, #16213e);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
      z-index: 10;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .nav-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.7);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .nav-btn:active { transform: scale(0.92); }
    .nav-btn.home-btn { font-size: 14px; }

    .url-bar {
      flex: 1;
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 0 12px;
      transition: border-color 0.2s;
    }
    .url-bar:focus-within {
      border-color: rgba(0,212,255,0.5);
      background: rgba(255,255,255,0.08);
    }

    .url-bar .protocol {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      margin-right: 4px;
      flex-shrink: 0;
      user-select: none;
    }

    .url-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 13px;
      padding: 8px 0;
      outline: none;
      font-family: 'Inter', monospace;
    }
    .url-input::placeholder { color: rgba(255,255,255,0.3); }

    .go-btn {
      padding: 6px 16px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #00d4ff, #7b2ff7);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .go-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .go-btn:active { transform: scale(0.95); }

    .quick-links {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .quick-link {
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .quick-link:hover { background: rgba(255,255,255,0.1); color: #fff; }

    .iframe-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .iframe-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }

    .iframe-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0f23, #1a1a3e);
      z-index: 5;
      transition: opacity 0.3s;
    }
    .iframe-overlay.hidden { opacity: 0; pointer-events: none; }

    .welcome {
      text-align: center;
      max-width: 500px;
      padding: 2rem;
    }
    .welcome-icon { font-size: 64px; margin-bottom: 16px; }
    .welcome h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #00d4ff, #7b2ff7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .welcome p { color: rgba(255,255,255,0.5); font-size: 0.9rem; line-height: 1.6; margin-bottom: 20px; }

    .welcome-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .welcome-link {
      padding: 10px 20px;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .welcome-link:hover {
      background: rgba(0,212,255,0.15);
      border-color: rgba(0,212,255,0.4);
      transform: translateY(-2px);
    }
    .welcome-link .emoji { font-size: 1.2rem; margin-right: 6px; }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 16px;
      background: rgba(15,15,35,0.95);
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      flex-shrink: 0;
    }

    .ai-status {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ai-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4caf50;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .back-link {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      font-size: 12px;
      transition: color 0.2s;
    }
    .back-link:hover { color: #00d4ff; }

    @media (max-width: 768px) {
      .toolbar { padding: 8px 10px; gap: 6px; }
      .quick-links { display: none; }
      .url-input { font-size: 12px; }
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <div class="toolbar-left">
      <a href="./index.html" class="nav-btn home-btn" title="返回首页">🏠</a>
      <button class="nav-btn" id="btn-back" title="后退">←</button>
      <button class="nav-btn" id="btn-forward" title="前进">→</button>
      <button class="nav-btn" id="btn-reload" title="刷新">↻</button>
    </div>

    <div class="url-bar">
      <span class="protocol" id="protocol-label"></span>
      <input class="url-input" id="url-input" type="text"
             placeholder="输入网址或选择下方快捷入口…" autocomplete="off" spellcheck="false">
    </div>

    <button class="go-btn" id="btn-go">前往</button>

    <div class="quick-links">
      <button class="quick-link" data-url="./index.html">🏠 首页</button>
      <button class="quick-link" data-url="./games.html">🎮 游戏中心</button>
      <button class="quick-link" data-url="./games/uno/client/index.html">🃏 UNO</button>
    </div>
  </div>

  <div class="iframe-wrapper">
    <div class="iframe-overlay" id="welcome-overlay">
      <div class="welcome">
        <div class="welcome-icon">🤖</div>
        <h2>AI 助手测试台</h2>
        <p>在地址栏输入任意网址（如 baidu.com）或选择本站页面。外部网页通过后端代理加载，AI 助手同样可用。</p>
        <div class="welcome-links">
          <a class="welcome-link" data-url="./index.html"><span class="emoji">🏠</span>首页</a>
          <a class="welcome-link" data-url="./games.html"><span class="emoji">🎮</span>游戏中心</a>
          <a class="welcome-link" data-url="./games/uno/client/index.html"><span class="emoji">🃏</span>UNO 对战</a>
          <a class="welcome-link" data-url="./games/snake/client/index.html"><span class="emoji">🐍</span>贪吃蛇</a>
          <a class="welcome-link" data-url="./games/minesweeper/client/"><span class="emoji">💣</span>扫雷</a>
        </div>
      </div>
    </div>
    <iframe id="main-frame"></iframe>
  </div>

  <div class="status-bar">
    <a href="./index.html" class="back-link">← 返回 INDEED 首页</a>
    <div class="ai-status">
      <div class="ai-dot" id="ai-dot"></div>
      <span id="ai-status-text">AI 助手就绪</span>
    </div>
  </div>

  <script>
    const frame      = document.getElementById('main-frame');
    const urlInput   = document.getElementById('url-input');
    const overlay    = document.getElementById('welcome-overlay');
    const protoLabel = document.getElementById('protocol-label');
    const aiDot      = document.getElementById('ai-dot');
    const aiText     = document.getElementById('ai-status-text');

    // 2026-03-19: 判断是否为本站路径（相对路径或同源绝对路径）
    function isLocalUrl(url) {
      if (/^\.\//.test(url) || /^\/(?!\/)/.test(url)) return true;
      try {
        return new URL(url, location.href).origin === location.origin;
      } catch { return false; }
    }

    function navigateTo(url) {
      if (!url) return;
      // 自动补全协议：含域名特征的补 https://，否则当本站路径
      if (!/^https?:\/\//i.test(url) && !/^\.\//.test(url) && !/^\//.test(url)) {
        if (/\.[a-z]{2,}(\/|$)/i.test(url)) {
          url = 'https://' + url;
        } else {
          url = './' + url;
        }
      }
      // 2026-03-19: 外部 URL 走后端反向代理，绕过 iframe 跨域 / X-Frame-Options
      if (!isLocalUrl(url)) {
        frame.src = '/api/browse?url=' + encodeURIComponent(url);
      } else {
        frame.src = url;
      }
      overlay.classList.add('hidden');
      updateUrlBar(url);
    }

    function updateUrlBar(url) {
      if (!url || url === 'about:blank') { urlInput.value = ''; protoLabel.textContent = ''; return; }
      try {
        const u = new URL(url, location.href);
        protoLabel.textContent = u.protocol + '//';
        urlInput.value = u.host + u.pathname + u.search + u.hash;
      } catch {
        protoLabel.textContent = '';
        urlInput.value = url;
      }
    }

    document.getElementById('btn-go').addEventListener('click', () => navigateTo(urlInput.value.trim()));
    urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') navigateTo(urlInput.value.trim()); });

    document.getElementById('btn-back').addEventListener('click', () => {
      try { frame.contentWindow.history.back(); } catch {}
    });
    document.getElementById('btn-forward').addEventListener('click', () => {
      try { frame.contentWindow.history.forward(); } catch {}
    });
    document.getElementById('btn-reload').addEventListener('click', () => {
      try { frame.contentWindow.location.reload(); } catch {}
    });

    document.querySelectorAll('[data-url]').forEach(el => {
      el.addEventListener('click', e => {
        e.preventDefault();
        navigateTo(el.dataset.url);
      });
    });

    // 2026-03-19: iframe 加载完成后注入 page-agent（同源 + 代理页面均可）
    frame.addEventListener('load', () => {
      try {
        const doc = frame.contentDocument;
        if (!doc) throw new Error('cross-origin');

        const currentUrl = frame.contentWindow.location.href;
        if (currentUrl === 'about:blank') return;

        // 代理页面的真实 URL 从地址栏取（不覆盖 urlInput）
        const isProxied = currentUrl.includes('/api/browse?url=');
        if (!isProxied) updateUrlBar(currentUrl);

        // 检查页面是否已自带 page-agent（代理注入或本站自带）
        if (doc.querySelector('#injected-page-agent') ||
            frame.contentWindow.__pageAgentInjected) {
          setAiStatus('ok', isProxied ? 'AI 助手已就绪（代理模式）' : 'AI 助手已就绪（本站页面）');
          return;
        }

        // 同源页面 / 代理页面：注入 page-agent 脚本
        const injectScript = doc.createElement('script');
        injectScript.id = 'injected-page-agent';
        injectScript.type = 'module';
        injectScript.src = '/src/page-agent-inject.js';
        doc.body.appendChild(injectScript);

        setAiStatus('ok', isProxied ? 'AI 助手已注入（代理模式）' : 'AI 助手已注入（本站页面）');
      } catch {
        setAiStatus('cross', '外部页面 · AI 助手不可用（跨域限制）');
      }
    });

    frame.addEventListener('error', () => {
      setAiStatus('error', '该网站加载失败');
    });

    function setAiStatus(type, text) {
      const colors = { ok: '#4caf50', cross: '#ff9800', error: '#ff4757' };
      aiDot.style.background = colors[type] || '#ff9800';
      aiDot.style.animation = type === 'ok' ? 'pulse 2s infinite' : 'none';
      aiText.textContent = text;
    }
  </script>
</body>
</html>
